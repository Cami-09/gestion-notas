<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Integra Pro v42.0 | Elite Master Build</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: #f8fafc; margin: 0; }
        .tab-content { display: none; }
        .tab-content.active { display: block !important; }

        /* Sidebars dinámicos */
        .sidebar-admin { background: #0f172a; border-right: 1px solid #1e293b; }
        .sidebar-docente { background: #064e3b; border-right: 1px solid #065f46; }
        .sidebar-estudiante { background: #1e1b4b; border-right: 1px solid #312e81; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.96); z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(15px); }
        .modal.active { display: flex; }

        .glass-card { background: #0f172a; border: 1px solid #1e293b; border-radius: 1.5rem; transition: all 0.3s ease; }
        .glass-card:hover { border-color: #f97316; }

        /* Estética de Inputs */
        .input-nota { background: #020617; border: 1px solid #334155; color: white; width: 60px; height: 40px; text-align: center; font-weight: 800; border-radius: 0.75rem; font-size: 15px; }
        .input-nota:focus { border-color: #f97316; outline: none; box-shadow: 0 0 15px rgba(249, 115, 22, 0.3); }
        .input-nota:disabled { opacity: 0.6; cursor: not-allowed; background: #1e293b; color: #94a3b8; }
        
        .input-desc { background: #1e293b; color: #94a3b8; font-size: 10px; padding: 7px; border-radius: 0.5rem; width: 100%; border: 1px solid transparent; margin-top: 5px; }

        .nota-red { color: #ef4444 !important; border-color: #ef4444 !important; } 
        .nota-orange { color: #f97316 !important; border-color: #f97316 !important; } 
        .nota-green { color: #10b981 !important; border-color: #10b981 !important; }

        .accordion-content { max-height: 0; overflow: hidden; transition: all 0.4s ease-in-out; }
        .accordion-content.open { max-height: 5000px; padding-top: 1.5rem; }

        .it-custom-name-input { background: transparent; border: none; border-bottom: 1px dashed #475569; color: white; font-weight: 800; text-transform: uppercase; font-size: 10px; width: 100%; }
        .it-custom-name-input:focus { outline: none; border-bottom-color: #f97316; }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }

        .student-row-card { background: #0f172a; border: 1px solid #1e293b; border-radius: 2rem; padding: 2.5rem; margin-bottom: 2rem; display: flex; flex-direction: row; gap: 2.5rem; align-items: flex-start; box-shadow: 0 20px 50px -12px rgba(0,0,0,0.5); }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-sm">

    <aside id="sidebar" class="w-64 flex flex-col shadow-2xl transition-all duration-300 shrink-0">
        <div class="p-8 border-b border-white/5 flex items-center gap-4">
            <div class="bg-orange-500 p-2.5 rounded-xl shadow-lg rotate-3"><i class="fas fa-crown text-xl text-white"></i></div>
            <h1 class="text-xl font-extrabold tracking-tighter italic text-white">INTEGRA<span class="text-orange-500 ml-1 text-sm">PRO</span></h1>
        </div>
        <nav id="menu-nav" class="mt-8 flex-1 px-4 space-y-3"></nav>
        <div class="p-6 bg-black/20 text-[10px] text-center font-bold opacity-30 uppercase italic tracking-[0.3em]">Build 42.0 Final</div>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="h-20 bg-[#0f172a]/80 backdrop-blur-xl border-b border-white/5 flex justify-between items-center px-10 shrink-0">
            <h2 id="view-title" class="text-xl font-black text-white uppercase italic tracking-tighter">Panel Maestro</h2>
            <div class="flex items-center gap-6">
                <div class="text-right">
                    <p id="navFullName" class="font-extrabold text-white text-md leading-none"></p>
                    <p id="navRole" class="text-[10px] uppercase text-orange-500 font-black mt-1 tracking-widest"></p>
                </div>
                <button onclick="logout()" class="w-12 h-12 bg-red-500/10 text-red-500 rounded-2xl flex items-center justify-center hover:bg-red-500 hover:text-white transition-all border border-red-500/20">
                    <i class="fas fa-power-off"></i>
                </button>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-10 custom-scrollbar">
            
            <div id="view-admin-main" class="tab-content space-y-8">
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                    <div class="glass-card p-8">
                        <h3 class="text-xs font-black uppercase mb-6 text-orange-500 flex items-center gap-2 italic"><i class="fas fa-user-plus"></i> Usuarios</h3>
                        <div class="grid grid-cols-2 gap-5">
                            <input type="text" id="adm_u_name" placeholder="Nombre" class="bg-[#020617] border border-white/10 p-4 rounded-2xl text-white outline-none">
                            <input type="text" id="adm_u_user" placeholder="ID" class="bg-[#020617] border border-white/10 p-4 rounded-2xl text-white outline-none">
                            <input type="password" id="adm_u_pass" placeholder="Pass" class="bg-[#020617] border border-white/10 p-4 rounded-2xl text-white outline-none">
                            <select id="adm_u_role" class="bg-[#020617] border border-white/10 p-4 rounded-2xl text-white font-bold">
                                <option value="Estudiante">Estudiante</option>
                                <option value="Docente">Docente</option>
                                <option value="Administrativo">Administrativo</option>
                            </select>
                        </div>
                        <button onclick="saveUser()" class="w-full mt-6 bg-orange-600 py-4 rounded-2xl font-black uppercase text-xs italic">Guardar</button>
                    </div>

                    <div class="glass-card p-8">
                        <h3 class="text-xs font-black uppercase mb-6 text-blue-500 flex items-center gap-2 italic"><i class="fas fa-book"></i> Materias</h3>
                        <div class="space-y-6">
                            <div class="flex gap-4">
                                <input type="text" id="adm_m_name" placeholder="Materia" class="flex-1 bg-[#020617] border border-white/10 p-4 rounded-2xl text-white outline-none">
                                <button onclick="saveMateria()" class="bg-blue-600 px-8 rounded-2xl font-black uppercase text-xs">Crear</button>
                            </div>
                            <div class="p-6 bg-[#020617] rounded-[2rem] border border-white/5 space-y-4">
                                <div class="flex gap-4">
                                    <select id="sel_dest_mat" class="flex-1 bg-[#0f172a] p-3 rounded-xl text-white text-[10px] font-bold border-none"></select>
                                    <select id="sel_dest_user" class="flex-1 bg-[#0f172a] p-3 rounded-xl text-white text-[10px] font-bold border-none"></select>
                                </div>
                                <button onclick="matricularAction()" class="w-full bg-indigo-600 py-3 rounded-xl font-black uppercase text-[10px]">Vincular</button>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div id="list_users" class="glass-card max-h-80 overflow-y-auto divide-y divide-white/5"></div>
                    <div id="list_mats" class="glass-card max-h-80 overflow-y-auto divide-y divide-white/5"></div>
                </div>
            </div>

            <div id="view-admin-config" class="tab-content space-y-8">
                <div class="glass-card p-10 space-y-12">
                    <h3 class="text-xs font-black uppercase text-indigo-400 italic">Ítems Evaluativos</h3>
                    <div id="config_items_container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-6"></div>
                    <div id="config_periods_container" class="grid grid-cols-1 md:grid-cols-3 gap-8 pt-10 border-t border-white/5"></div>
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
                        <div class="p-8 bg-[#020617] rounded-[2.5rem] border border-white/5">
                            <h4 class="text-xs font-black uppercase text-orange-500 mb-6 italic">Rúbrica</h4>
                            <div class="grid grid-cols-3 gap-6">
                                <input type="number" id="rub_bajo_input" class="w-full bg-[#0f172a] p-4 rounded-2xl text-red-500 font-black">
                                <input type="number" id="rub_basico_input" class="w-full bg-[#0f172a] p-4 rounded-2xl text-orange-500 font-black">
                                <input type="number" id="rub_alto_input" class="w-full bg-[#0f172a] p-4 rounded-2xl text-green-500 font-black">
                            </div>
                        </div>
                        <div class="p-8 bg-[#020617] rounded-[2.5rem] border border-white/5">
                            <h4 class="text-xs font-black uppercase text-emerald-500 mb-6 italic">Fechas Autoevaluación</h4>
                            <div id="config_auto_dates" class="space-y-5"></div>
                        </div>
                    </div>
                    <button onclick="saveGlobalConfig()" class="bg-indigo-600 px-16 py-5 rounded-[2.5rem] font-black uppercase italic text-xs">Guardar Todo</button>
                </div>
            </div>

            <div id="view-docente-mats" class="tab-content">
                <div id="docente_cards_container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
            </div>

            <div id="view-estudiante-main" class="tab-content">
                <div class="bg-indigo-900/80 p-12 rounded-[3.5rem] flex justify-between items-center mb-10 border border-white/10 shadow-2xl">
                    <h3 class="text-3xl font-black italic uppercase tracking-tighter">Mi Reporte</h3>
                    <button onclick="abrirSelectorUniversal()" class="bg-white text-indigo-900 px-10 py-5 rounded-3xl font-black uppercase text-xs italic">Periodo</button>
                </div>
                <div id="boletin_container" class="space-y-8"></div>
            </div>

            <div id="view-estudiante-auto" class="tab-content">
                <div class="bg-[#0f172a] p-10 rounded-[3.5rem] border border-white/5 mb-10">
                    <h3 class="text-2xl font-black italic uppercase text-orange-500">Autoevaluación Estudiante</h3>
                </div>
                <div id="estudiante_auto_list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
            </div>
        </div>
    </main>

    <div id="modal_periodos" class="modal">
        <div class="bg-[#0f172a] w-full max-w-sm rounded-[3rem] border border-white/10 p-8">
            <h4 id="selector_title" class="font-black uppercase text-xs italic text-indigo-400 mb-6"></h4>
            <div id="period_list_container" class="space-y-4"></div>
            <button onclick="closeModal('modal_periodos')" class="mt-6 w-full text-xs font-black uppercase opacity-40">Cerrar</button>
        </div>
    </div>

    <div id="modal_auto" class="modal">
        <div class="bg-[#0f172a] w-full max-w-md rounded-[3rem] border border-white/10 p-10 text-center">
            <h3 id="modal_auto_title" class="text-xl font-black uppercase italic mb-8"></h3>
            <input type="number" id="auto_nota_val" class="bg-[#020617] border border-white/10 p-8 rounded-[2rem] text-4xl font-black text-center text-white w-full outline-none">
            <div id="auto_status_msg" class="my-6 text-[10px] font-black uppercase italic"></div>
            <button id="btn_save_auto" onclick="guardarMiAuto()" class="w-full bg-orange-600 py-6 rounded-[2rem] font-black uppercase italic text-xs">Sincronizar</button>
            <button onclick="closeModal('modal_auto')" class="mt-6 text-gray-500 text-xs font-black uppercase">Cerrar</button>
        </div>
    </div>

    <div id="modal_planilla" class="modal">
        <div class="bg-[#020617] w-full h-full flex flex-col">
            <header class="p-8 bg-[#0f172a] border-b border-white/10 flex justify-between items-center shrink-0">
                <div class="flex items-center gap-8">
                    <button onclick="closeModal('modal_planilla')" class="w-12 h-12 bg-white/5 rounded-2xl flex items-center justify-center hover:bg-orange-500"><i class="fas fa-arrow-left"></i></button>
                    <h2 id="planilla_header_txt" class="text-3xl font-black uppercase italic"></h2>
                </div>
                <div class="flex items-center gap-6">
                    <div id="timer_display" class="text-[10px] font-black uppercase"></div>
                    <button id="save_btn" onclick="saveNotasDB()" class="bg-orange-500 px-14 py-4 rounded-2xl font-black uppercase italic text-xs">Guardar Cambios</button>
                </div>
            </header>
            <div class="flex-1 overflow-auto p-10 custom-scrollbar">
                <div id="planilla_items_header" class="flex gap-6 mb-12 overflow-x-auto pb-4"></div>
                <div id="planilla_students_list" class="space-y-8 max-w-[1600px] mx-auto pb-32"></div>
            </div>
        </div>
    </div>

    <script>
        // --- DATA v42.0 ---
        const sesion = JSON.parse(sessionStorage.getItem('activeUser'));
        if(!sesion) window.location.href = 'index.html';

        let db_users = JSON.parse(localStorage.getItem('db_users')) || { 'admin': { user: 'admin', pass: '123', fullname: 'Administrador', role: 'Administrativo' } };
        let db_mats = JSON.parse(localStorage.getItem('db_mats')) || [];
        let db_notas = JSON.parse(localStorage.getItem('db_notas')) || {};
        let db_conf = JSON.parse(localStorage.getItem('db_conf')) || {
            items: [
                { id: 'acad', name: 'Académico', weight: 65, count: 8, color: '#9333ea' },
                { id: 'eval', name: 'Acumulativa', weight: 15, count: 1, color: '#2563eb' },
                { id: 'pers', name: 'Personal', weight: 10, count: 3, color: '#059669' },
                { id: 'soci', name: 'Social', weight: 5, count: 3, color: '#0891b2' },
                { id: 'auto', name: 'Autoevaluación', weight: 5, count: 1, color: '#f59e0b' }
            ],
            periodos: { 1: {start:'', end:''}, 2: {start:'', end:''}, 3: {start:'', end:''} },
            auto_dates: { 1: {start:'', end:''}, 2: {start:'', end:''}, 3: {start:'', end:''} },
            rubrica: { bajo: 29, basico: 39, alto: 50 }
        };

        let curMat = null, curPer = null, timerInterval = null, isLocked = false;

        window.onload = () => {
            document.getElementById('navFullName').innerText = sesion.fullname;
            document.getElementById('navRole').innerText = sesion.role;
            document.getElementById('sidebar').className = `w-64 flex flex-col shrink-0 sidebar-${sesion.role.toLowerCase().replace('administrativo','admin')}`;
            renderMenu();
            loadHome();
        };

        function renderMenu() {
            const nav = document.getElementById('menu-nav');
            let h = `<button onclick="loadHome()" class="w-full text-left p-4 hover:bg-white/10 rounded-2xl font-black text-[11px] uppercase italic flex items-center gap-4"><i class="fas fa-home text-orange-500"></i> Inicio</button>`;
            if(sesion.role === 'Administrativo') {
                h += `<button onclick="showView('admin-main')" class="w-full text-left p-4 hover:bg-white/10 rounded-2xl font-black text-[11px] uppercase italic flex items-center gap-4"><i class="fas fa-users-cog text-blue-400"></i> Estructura</button>
                      <button onclick="showView('admin-config')" class="w-full text-left p-4 hover:bg-white/10 rounded-2xl font-black text-[11px] uppercase italic flex items-center gap-4"><i class="fas fa-cogs text-indigo-400"></i> Parámetros</button>`;
            } else if(sesion.role === 'Docente') {
                h += `<button onclick="showView('docente-mats')" class="w-full text-left p-4 hover:bg-white/10 rounded-2xl font-black text-[11px] uppercase italic flex items-center gap-4"><i class="fas fa-list text-emerald-400"></i> Planillas</button>`;
            } else if(sesion.role === 'Estudiante') {
                h += `<button onclick="showView('estudiante-main')" class="w-full text-left p-4 hover:bg-white/10 rounded-2xl font-black text-[11px] uppercase italic flex items-center gap-4"><i class="fas fa-star text-indigo-400"></i> Calificaciones</button>
                      <button onclick="showView('estudiante-auto')" class="w-full text-left p-4 hover:bg-white/10 rounded-2xl font-black text-[11px] uppercase italic flex items-center gap-4"><i class="fas fa-user-check text-orange-400"></i> Autoevaluación</button>`;
            }
            nav.innerHTML = h;
        }

        function showView(v) {
            document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
            document.getElementById(`view-${v}`).classList.add('active');
            if(v === 'admin-main') loadAdmin();
            if(v === 'admin-config') loadConfig();
            if(v === 'docente-mats') loadDocente();
            if(v === 'estudiante-auto') loadAutoEstudiante();
            document.getElementById('view-title').innerText = v.toUpperCase();
        }

        function loadHome() {
            if(sesion.role === 'Administrativo') showView('admin-main');
            else if(sesion.role === 'Docente') showView('docente-mats');
            else showView('estudiante-main');
        }

        function getNotaColor(val) {
            const v = parseFloat(val); if(!v) return "text-gray-600";
            if(v <= db_conf.rubrica.bajo) return "nota-red";
            if(v <= db_conf.rubrica.basico) return "nota-orange";
            return "nota-green";
        }

        // --- ADMIN ---
        function loadAdmin() {
            document.getElementById('list_users').innerHTML = Object.values(db_users).map(u => `<div class="p-5 flex justify-between"><div><b class="text-white">${u.fullname}</b><p class="text-[8px] opacity-50">@${u.user}</p></div><button onclick="deleteUser('${u.user}')" class="text-red-500">×</button></div>`).join('');
            document.getElementById('list_mats').innerHTML = db_mats.map(m => `<div class="p-5 flex justify-between"><div><b class="text-white">${m.nombre}</b><p class="text-[8px] opacity-50">${db_users[m.docente]?.fullname || 'Sin Docente'}</p></div><div class="flex gap-4"><button onclick="abrirSelectorUniversal(${m.id})" class="text-emerald-500 font-black">Planilla</button><button onclick="deleteMat(${m.id})" class="text-red-500">×</button></div></div>`).join('');
            document.getElementById('sel_dest_mat').innerHTML = db_mats.map(m => `<option value="${m.id}">${m.nombre}</option>`).join('');
            document.getElementById('sel_dest_user').innerHTML = Object.values(db_users).map(u => `<option value="${u.user}">${u.fullname}</option>`).join('');
        }
        function saveUser() {
            const u = document.getElementById('adm_u_user').value, p = document.getElementById('adm_u_pass').value, n = document.getElementById('adm_u_name').value, r = document.getElementById('adm_u_role').value;
            if(!u || !p || !n) return; db_users[u] = { user:u, pass:p, fullname:n, role:r }; localStorage.setItem('db_users', JSON.stringify(db_users)); loadAdmin();
        }
        function deleteUser(u) { delete db_users[u]; localStorage.setItem('db_users', JSON.stringify(db_users)); loadAdmin(); }
        function saveMateria() { const n = document.getElementById('adm_m_name').value; if(n){ db_mats.push({id:Date.now(), nombre:n, alumnos:[], docente:null, item_counts:{}, item_names:{}}); localStorage.setItem('db_mats', JSON.stringify(db_mats)); loadAdmin(); } }
        function deleteMat(id) { db_mats = db_mats.filter(m=>m.id!=id); localStorage.setItem('db_mats', JSON.stringify(db_mats)); loadAdmin(); }
        function matricularAction() {
            const m = db_mats.find(x => x.id == document.getElementById('sel_dest_mat').value), uId = document.getElementById('sel_dest_user').value, u = db_users[uId];
            if(u.role === 'Docente') m.docente = uId; else if(u.role === 'Estudiante' && !m.alumnos.includes(uId)) m.alumnos.push(uId);
            localStorage.setItem('db_mats', JSON.stringify(db_mats)); loadAdmin();
        }

        // --- CONFIG ---
        function loadConfig() {
            document.getElementById('rub_bajo_input').value = db_conf.rubrica.bajo;
            document.getElementById('rub_basico_input').value = db_conf.rubrica.basico;
            document.getElementById('rub_alto_input').value = db_conf.rubrica.alto;
            document.getElementById('config_items_container').innerHTML = db_conf.items.map(it => `
                <div class="bg-[#020617] p-5 rounded-[2rem] border border-white/5 it-row">
                    <input type="text" class="it-name w-full font-black text-[10px] bg-transparent border-b border-white/5 mb-4 text-indigo-400 uppercase" value="${it.name}">
                    <div class="grid grid-cols-2 gap-2 text-[8px]">
                        <div>PESO %<input type="number" class="it-weight w-full bg-[#0f172a] p-2 mt-1 rounded" value="${it.weight}"></div>
                        <div>NOTAS<input type="number" class="it-count w-full bg-[#0f172a] p-2 mt-1 rounded" value="${it.count}"></div>
                    </div>
                </div>`).join('');
            document.getElementById('config_periods_container').innerHTML = [1,2,3].map(p => `
                <div class="bg-[#020617] p-6 rounded-[2rem] border border-white/5 per-row" data-p="${p}">
                    <h4 class="font-black text-[9px] text-indigo-500 mb-4 uppercase">Periodo ${p}</h4>
                    <input type="datetime-local" class="p-start w-full bg-[#0f172a] text-[10px] p-2 mb-2 rounded" value="${db_conf.periodos[p].start}">
                    <input type="datetime-local" class="p-end w-full bg-[#0f172a] text-[10px] p-2 rounded" value="${db_conf.periodos[p].end}">
                </div>`).join('');
            document.getElementById('config_auto_dates').innerHTML = [1,2,3].map(p => `
                <div class="bg-[#020617] p-4 rounded-xl border border-white/5 auto-row" data-p="${p}">
                    <span class="text-[8px] font-black uppercase text-indigo-400">P${p} Auto</span>
                    <div class="grid grid-cols-2 gap-2 mt-2">
                        <input type="datetime-local" class="a-start w-full bg-[#0f172a] text-[9px] p-2 rounded" value="${db_conf.auto_dates[p].start}">
                        <input type="datetime-local" class="a-end w-full bg-[#0f172a] text-[9px] p-2 rounded" value="${db_conf.auto_dates[p].end}">
                    </div>
                </div>`).join('');
        }
        function saveGlobalConfig() {
            db_conf.rubrica = { bajo: parseInt(document.getElementById('rub_bajo_input').value), basico: parseInt(document.getElementById('rub_basico_input').value), alto: parseInt(document.getElementById('rub_alto_input').value) };
            document.querySelectorAll('.it-row').forEach((row, i) => {
                db_conf.items[i].name = row.querySelector('.it-name').value;
                db_conf.items[i].weight = parseFloat(row.querySelector('.it-weight').value);
                db_conf.items[i].count = parseInt(row.querySelector('.it-count').value);
            });
            document.querySelectorAll('.per-row').forEach(row => { const p = row.dataset.p; db_conf.periodos[p].start = row.querySelector('.p-start').value; db_conf.periodos[p].end = row.querySelector('.p-end').value; });
            document.querySelectorAll('.auto-row').forEach(row => { const p = row.dataset.p; db_conf.auto_dates[p].start = row.querySelector('.a-start').value; db_conf.auto_dates[p].end = row.querySelector('.a-end').value; });
            localStorage.setItem('db_conf', JSON.stringify(db_conf)); location.reload();
        }

        // --- PLANILLA ---
        function changeColumnCount(itId, delta) {
            if(!curMat.item_counts) curMat.item_counts = {};
            const baseCount = db_conf.items.find(x => x.id === itId).count;
            const current = curMat.item_counts[`${curPer}_${itId}`] ?? baseCount;
            curMat.item_counts[`${curPer}_${itId}`] = Math.max(1, current + delta);
            localStorage.setItem('db_mats', JSON.stringify(db_mats)); abrirPlanilla(curPer);
        }
        function getNotaCount(itId) { return curMat.item_counts?.[`${curPer}_${itId}`] ?? db_conf.items.find(x => x.id === itId).count; }
        function getCustomItemName(itId) { return curMat.item_names?.[`${curPer}_${itId}`] ?? db_conf.items.find(x => x.id === itId).name; }

        function abrirSelectorUniversal(mid = null) {
            if(mid) curMat = db_mats.find(m => m.id == mid);
            openModal('modal_periodos');
            document.getElementById('selector_title').innerText = "Ciclo Académico";
            document.getElementById('period_list_container').innerHTML = [1,2,3].map(p => `<div onclick="${sesion.role==='Estudiante' ? `renderBoletin(${p})` : `abrirPlanilla(${p})`}" class="bg-[#020617] border border-white/5 p-5 rounded-xl cursor-pointer hover:border-orange-500 font-black uppercase text-xs">Periodo ${p}</div>`).join('');
        }

        function loadDocente() {
            const mis = db_mats.filter(m => m.docente === sesion.user);
            document.getElementById('docente_cards_container').innerHTML = mis.map(m => `<div class="glass-card p-8"><h4 class="text-xl font-black uppercase italic text-white mb-6">${m.nombre}</h4><button onclick="abrirSelectorUniversal(${m.id})" class="w-full bg-orange-600 py-4 rounded-xl font-black uppercase text-xs shadow-xl">Gestionar</button></div>`).join('');
        }

        function abrirPlanilla(p) {
            curPer = p; closeModal('modal_periodos'); openModal('modal_planilla');
            const isAdmin = sesion.role === 'Administrativo';
            if(isAdmin) { isLocked = false; document.getElementById('save_btn').style.display = 'block'; }
            else checkLock(db_conf.periodos[p].start, db_conf.periodos[p].end);
            
            document.getElementById('planilla_header_txt').innerText = `${curMat.nombre} | P${p}`;
            
            // Header: Todos los ítems
            document.getElementById('planilla_items_header').innerHTML = db_conf.items.map(it => {
                const count = getNotaCount(it.id); const customName = getCustomItemName(it.id);
                return `<div class="min-w-[210px] p-5 rounded-3xl border border-white/5 flex flex-col gap-3" style="background: ${it.color}15">
                    <div class="flex justify-between items-center">
                        ${isAdmin ? `<input type="text" class="it-custom-name-input it-custom-name" data-itid="${it.id}" value="${customName}">` : `<span class="text-[10px] font-black uppercase text-white">${customName}</span>`}
                        <span class="text-[9px] font-black bg-black/40 px-3 py-1 rounded-lg">${it.weight}%</span>
                    </div>
                    <div class="flex justify-between items-center text-[8px] font-black opacity-30">
                        <span>${count} NOTAS</span>
                        ${isAdmin ? `<div class="flex gap-2"><button onclick="changeColumnCount('${it.id}', 1)" class="w-5 h-5 bg-white/10 rounded">+</button><button onclick="changeColumnCount('${it.id}', -1)" class="w-5 h-5 bg-white/10 rounded">-</button></div>` : ''}
                    </div>
                </div>`;
            }).join('');

            // Estudiantes: Todas las celdas
            document.getElementById('planilla_students_list').innerHTML = curMat.alumnos.map(uid => {
                const est = db_users[uid] || {fullname: uid}, key = `${curMat.id}_${curPer}_${uid}`, n = db_notas[key] || {};
                let itemsHtml = db_conf.items.map(it => {
                    const count = getNotaCount(it.id); let ni = "";
                    for(let i=0; i<count; i++) {
                        const val = n[it.id+'_'+i] || '', d = n[it.id+'_'+i+'_desc'] || '';
                        const readOnly = (it.id==='auto' && !isAdmin) ? 'disabled' : (isLocked ? 'disabled' : '');
                        ni += `<div class="flex flex-col gap-1">
                                <input type="number" class="input-nota ${getNotaColor(val)}" data-uid="${uid}" data-it="${it.id}" data-idx="${i}" value="${val}" ${readOnly}>
                                <input type="text" class="input-desc" placeholder="..." data-uid="${uid}" data-it="${it.id}" data-idx="${i}" data-type="desc" value="${d}" ${readOnly}>
                               </div>`;
                    }
                    return `<div class="p-6 bg-black/40 rounded-3xl border border-white/5 flex flex-wrap gap-4"><span class="w-full text-[8px] font-black opacity-20 uppercase border-b border-white/5 pb-2 mb-2">${getCustomItemName(it.id)}</span>${ni}</div>`;
                }).join('');

                return `<div class="student-row-card shadow-2xl">
                    <div class="w-64 flex flex-col items-center shrink-0 border-r border-white/5 pr-8">
                        <div class="w-16 h-16 bg-white/5 rounded-full flex items-center justify-center text-2xl mb-4 text-indigo-400 border border-white/10 shadow-inner"><i class="fas fa-user-graduate"></i></div>
                        <h5 class="text-white font-black uppercase text-sm mb-2">${est.fullname}</h5>
                        <p class="text-[9px] font-bold text-gray-600">ID: ${uid}</p>
                        <div class="mt-auto pt-8 border-t border-white/5 w-full text-center"><span class="text-[9px] font-black text-gray-500 uppercase block mb-1">Definitiva</span><span id="def_${uid}" class="text-5xl font-black tracking-tighter">--</span></div>
                    </div>
                    <div class="flex-1 grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 gap-6">${itemsHtml}</div>
                </div>`;
            }).join('');
            calc();
        }

        // --- AUTOEVALUACION ESTUDIANTE ---
        function loadAutoEstudiante() {
            const mis = db_mats.filter(m => m.alumnos.includes(sesion.user));
            document.getElementById('estudiante_auto_list').innerHTML = mis.map(m => `<div class="glass-card p-8 flex justify-between items-center transition-all"><div><h4 class="text-lg font-black text-white uppercase italic tracking-tighter">${m.nombre}</h4></div><button onclick="prepararAuto(${m.id})" class="bg-orange-600 px-8 py-3 rounded-2xl font-black uppercase italic text-[10px] shadow-xl">Cargar Nota</button></div>`).join('');
        }
        function prepararAuto(mid) {
            curMat = db_mats.find(x => x.id === mid); openModal('modal_periodos');
            document.getElementById('selector_title').innerText = "Periodo Autoevaluación";
            document.getElementById('period_list_container').innerHTML = [1,2,3].map(p => `<div onclick="abrirModalNotaAuto(${p})" class="bg-[#020617] border border-white/5 p-5 rounded-xl cursor-pointer font-black uppercase text-xs">Periodo ${p}</div>`).join('');
        }
        function abrirModalNotaAuto(p) {
            curPer = p; closeModal('modal_periodos'); openModal('modal_auto');
            const range = db_conf.auto_dates[p], now = new Date().getTime(), start = new Date(range.start).getTime(), end = new Date(range.end).getTime();
            const isOpen = (range.start && range.end && now >= start && now <= end);
            document.getElementById('modal_auto_title').innerText = curMat.nombre;
            const key = `${curMat.id}_${curPer}_${sesion.user}`;
            document.getElementById('auto_nota_val').value = db_notas[key]?.['auto_0'] || '';
            const status = document.getElementById('auto_status_msg'), btn = document.getElementById('btn_save_auto');
            if(!isOpen) { status.innerText = "BLOQUEADO POR FECHAS"; status.className = "text-red-500 font-black"; btn.style.display = 'none'; document.getElementById('auto_nota_val').disabled = true; }
            else { status.innerText = "HABILITADO"; status.className = "text-emerald-500 font-black"; btn.style.display = 'block'; document.getElementById('auto_nota_val').disabled = false; }
        }
        function guardarMiAuto() {
            const val = document.getElementById('auto_nota_val').value; if(!val || val<10 || val>50) return alert("Rango 10-50");
            const key = `${curMat.id}_${curPer}_${sesion.user}`; if(!db_notas[key]) db_notas[key] = {};
            db_notas[key]['auto_0'] = val; db_notas[key]['auto_0_desc'] = "Auto-registro Estudiante";
            localStorage.setItem('db_notas', JSON.stringify(db_notas)); alert("Guardado."); closeModal('modal_auto');
        }

        function renderBoletin(p) {
            curPer = p; closeModal('modal_periodos');
            const mis = db_mats.filter(m => m.alumnos.includes(sesion.user)), cont = document.getElementById('boletin_container');
            cont.innerHTML = mis.map(m => {
                const k = `${m.id}_${p}_${sesion.user}`, n = db_notas[k] || {}; let detHtml = "", defF = 0;
                db_conf.items.forEach(it => {
                    let sum = 0; const count = m.item_counts?.[`${p}_${it.id}`] ?? it.count, cName = m.item_names?.[`${p}_${it.id}`] ?? it.name;
                    for(let i=0; i<count; i++) sum += parseFloat(n[it.id+'_'+i] || 0);
                    defF += (count > 0 ? (sum/count) : 0) * (it.weight/100);
                    detHtml += `<div class="mb-4 p-4 bg-white/5 rounded-2xl flex justify-between"><span>${cName}</span><b>${(count>0 ? (sum/count).toFixed(1) : '--')}</b></div>`;
                });
                return `<div class="glass-card p-10 flex justify-between items-center"><div><h4 class="text-2xl font-black text-white uppercase italic">${m.nombre}</h4><div class="mt-4">${detHtml}</div></div><div class="text-right"><span class="text-7xl font-black text-white">${defF.toFixed(1)}</span></div></div>`;
            }).join('');
        }

        function checkLock(start, end) {
            const disp = document.getElementById('timer_display'), btn = document.getElementById('save_btn'); if(timerInterval) clearInterval(timerInterval);
            const now = new Date().getTime(), sDate = new Date(start).getTime(), eDate = new Date(end).getTime();
            if(!start || !end) { isLocked = true; disp.innerText = "BLOQUEADO"; btn.style.display = 'none'; return; }
            const up = () => {
                const cur = new Date().getTime();
                if(cur < sDate) { isLocked = true; disp.innerText = "ESPERANDO APERTURA"; btn.style.display = 'none'; }
                else if(cur > eDate) { isLocked = true; disp.innerText = "CERRADO"; btn.style.display = 'none'; clearInterval(timerInterval); }
                else { isLocked = false; btn.style.display = 'block'; const diff = eDate - cur, d = Math.floor(diff/(1000*60*60*24)), h = Math.floor((diff%(1000*60*60*24))/(1000*60*60)), m = Math.floor((diff%(1000*60*60))/(1000*60)), s = Math.floor((diff%(1000*60))/1000);
                    disp.innerText = `CIERRE EN: ${d}d ${h}h ${m}m ${s}s`; }
            };
            up(); timerInterval = setInterval(up, 1000);
        }

        function saveNotasDB() {
            if(sesion.role === 'Administrativo') {
                if(!curMat.item_names) curMat.item_names = {};
                document.querySelectorAll('.it-custom-name').forEach(inp => curMat.item_names[`${curPer}_${inp.dataset.itid}`] = inp.value);
            }
            document.querySelectorAll('.input-nota').forEach(inp => {
                const {uid, it, idx} = inp.dataset, key = `${curMat.id}_${curPer}_${uid}`;
                if(!db_notas[key]) db_notas[key] = {}; db_notas[key][`${it}_${idx}`] = inp.value;
                const dInp = document.querySelector(`.input-desc[data-uid="${uid}"][data-it="${it}"][data-idx="${idx}"]`);
                db_notas[key][`${it}_${idx}_desc`] = dInp ? dInp.value : '';
            });
            localStorage.setItem('db_mats', JSON.stringify(db_mats));
            localStorage.setItem('db_notas', JSON.stringify(db_notas)); alert("Nube Actualizada."); calc();
        }

        function calc() {
            const alums = sesion.role === 'Estudiante' ? [sesion.user] : curMat.alumnos;
            alums.forEach(uid => {
                let f = 0;
                db_conf.items.forEach(it => {
                    let s = 0; const count = getNotaCount(it.id);
                    for(let i=0; i<count; i++) {
                        const val = document.querySelector(`.input-nota[data-uid="${uid}"][data-it="${it.id}"][data-idx="${i}"]`)?.value || 0;
                        s += parseFloat(val);
                    }
                    f += (count > 0 ? (s/count) : 0) * (it.weight/100);
                });
                const el = document.getElementById(`def_${uid}`); if(el){ el.innerText = f.toFixed(1); el.className = `text-5xl font-black ${getNotaColor(f)}`; }
            });
        }

        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); if(timerInterval) clearInterval(timerInterval); }
        function logout() { sessionStorage.clear(); window.location.href = 'index.html'; }
    </script>
</body>
</html>
