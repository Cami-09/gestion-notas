<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Integra Pro v4.0 | Gestión Académica Total</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .sidebar-admin { background: #1e293b; }
        .sidebar-docente { background: #065f46; }
        .tab-content { display: none; }
        .tab-content.active { display: block !important; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        /* Estilo para los inputs de la planilla */
        .input-nota { width: 45px; height: 30px; border: 1px solid #ddd; text-align: center; font-size: 11px; border-radius: 4px; }
        .input-nota:focus { border-color: #059669; outline: none; background: #ecfdf5; }
        .col-academic { background-color: #fdf2ff; }
        .col-acumula { background-color: #eff6ff; }
        .col-perso { background-color: #f0fdf4; }
        .col-social { background-color: #ecfeff; }
    </style>
</head>
<body class="bg-gray-100 flex h-screen overflow-hidden text-sm">

    <aside id="sidebar" class="w-64 text-white flex flex-col shadow-2xl transition-all duration-300">
        <div class="p-6 border-b border-white/10 flex items-center gap-3">
            <div class="bg-orange-500 p-2 rounded-lg"><i class="fas fa-graduation-cap text-xl"></i></div>
            <h1 class="text-xl font-black italic">INTEGRA</h1>
        </div>
        <nav class="mt-6 flex-1 px-4 space-y-2">
            <button class="w-full text-left p-3 bg-white/10 rounded-xl font-bold text-[10px] uppercase italic">
                <i class="fas fa- chalkboard-teacher mr-3"></i> Mi Dashboard
            </button>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="bg-white p-4 shadow-sm flex justify-between items-center px-8 border-b-2 border-gray-200">
            <div>
                <h2 class="text-lg font-black text-gray-800 uppercase italic">Notas Asignaturas</h2>
            </div>
            <div class="flex items-center gap-4">
                <div class="text-right">
                    <p id="navFullName" class="font-bold text-gray-900 leading-none"></p>
                    <p id="navRole" class="text-[10px] uppercase text-orange-600 font-black mt-1"></p>
                </div>
                <button onclick="logout()" class="w-8 h-8 bg-red-50 text-red-600 rounded-full flex items-center justify-center hover:bg-red-600 hover:text-white transition">
                    <i class="fas fa-power-off text-xs"></i>
                </button>
            </div>
        </header>

        <div class="p-6 overflow-y-auto h-full">
            
            <div id="view-admin" class="tab-content space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
                        <h3 class="font-black text-gray-700 uppercase text-xs mb-4 border-b pb-2">Configuración de Cronograma</h3>
                        <div class="space-y-4">
                            <select id="adm_periodo_sel" class="w-full p-2 border rounded-lg font-bold bg-gray-50">
                                <option value="1">Periodo 1</option>
                                <option value="2">Periodo 2</option>
                                <option value="3">Periodo 3</option>
                            </select>
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="text-[10px] font-bold text-gray-400 block mb-1 uppercase">Fecha Inicio</label>
                                    <input type="datetime-local" id="adm_fecha_inicio" class="w-full p-2 border rounded-lg text-xs">
                                </div>
                                <div>
                                    <label class="text-[10px] font-bold text-gray-400 block mb-1 uppercase">Fecha Cierre</label>
                                    <input type="datetime-local" id="adm_fecha_fin" class="w-full p-2 border rounded-lg text-xs">
                                </div>
                            </div>
                            <button onclick="saveCronograma()" class="w-full bg-blue-600 text-white py-2 rounded-lg font-black text-[10px] uppercase">Actualizar Fechas</button>
                        </div>
                    </div>

                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
                        <h3 class="font-black text-gray-700 uppercase text-xs mb-4 border-b pb-2">Creación y Asignación</h3>
                        <div class="space-y-3">
                            <input type="text" id="adm_mat_nombre" placeholder="Nombre de la Materia" class="w-full p-2 border rounded-lg text-xs">
                            <select id="adm_doc_sel" class="w-full p-2 border rounded-lg text-xs font-bold bg-gray-50"></select>
                            <button onclick="crearAsignatura()" class="w-full bg-orange-600 text-white py-2 rounded-lg font-black text-[10px] uppercase">Crear Asignatura</button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="view-docente" class="tab-content">
                <div class="bg-white rounded-xl shadow-sm overflow-hidden border border-gray-200">
                    <table class="w-full text-left">
                        <thead class="bg-gray-50 text-[10px] font-black uppercase text-gray-500 border-b">
                            <tr>
                                <th class="p-4">Grupo</th>
                                <th class="p-4">Grado</th>
                                <th class="p-4">Asignatura</th>
                                <th class="p-4">Ubicación</th>
                                <th class="p-4 text-center">Acción</th>
                            </tr>
                        </thead>
                        <tbody id="lista_materias_doc" class="divide-y divide-gray-100"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <div id="modal_periodos" class="modal">
        <div class="bg-white w-96 rounded-xl shadow-2xl overflow-hidden">
            <div class="bg-emerald-600 p-3 flex justify-between items-center text-white">
                <h4 class="font-bold text-xs uppercase">Seleccione el periodo</h4>
                <button onclick="closeModal('modal_periodos')" class="text-xl">&times;</button>
            </div>
            <div class="p-4 space-y-6" id="periodos_container">
                </div>
            <div class="p-4 bg-gray-50 text-right">
                <button onclick="closeModal('modal_periodos')" class="px-4 py-1.5 bg-gray-200 text-gray-700 rounded font-bold text-xs">Cancelar</button>
            </div>
        </div>
    </div>

    <div id="modal_planilla" class="modal">
        <div class="bg-white w-[98%] h-[95%] rounded-lg shadow-2xl overflow-hidden flex flex-col">
            <div class="bg-emerald-600 p-3 text-white flex justify-between items-center">
                <div class="flex gap-4 items-center">
                    <button onclick="closeModal('modal_planilla')" class="bg-white/20 px-3 py-1 rounded text-[10px] uppercase font-bold"><i class="fas fa-arrow-left mr-2"></i>Asignaturas</button>
                    <h4 id="planilla_titulo" class="font-bold text-xs uppercase"></h4>
                </div>
                <div id="planilla_countdown" class="bg-red-500 px-3 py-1 rounded text-[10px] font-black"></div>
            </div>
            
            <div class="overflow-auto flex-1">
                <table class="w-full border-collapse">
                    <thead>
                        <tr class="text-[9px] font-black uppercase text-center text-white">
                            <th rowspan="2" class="bg-gray-400 p-2 text-left text-gray-800">Estudiantes</th>
                            <th colspan="8" class="bg-purple-600 border-l border-white">65% - Académico</th>
                            <th colspan="1" class="bg-purple-800 border-l border-white">Subtot</th>
                            <th colspan="1" class="bg-blue-500 border-l border-white">15% - Acumulativa</th>
                            <th colspan="3" class="bg-green-600 border-l border-white">10% - Personal</th>
                            <th colspan="3" class="bg-cyan-600 border-l border-white">10% - Social</th>
                            <th rowspan="2" class="bg-gray-800 border-l border-white">Def</th>
                        </tr>
                        <tr class="text-[8px] font-black uppercase text-gray-500 bg-gray-50 text-center">
                            <th class="border">N1</th><th class="border">N2</th><th class="border">N3</th><th class="border">N4</th>
                            <th class="border">N5</th><th class="border">N6</th><th class="border">N7</th><th class="border">N8</th>
                            <th class="border bg-purple-50 italic">Prc.</th>
                            <th class="border">Eval</th>
                            <th class="border">N1</th><th class="border">N2</th><th class="border">N3</th>
                            <th class="border">N1</th><th class="border">N2</th><th class="border">N3</th>
                        </tr>
                    </thead>
                    <tbody id="planilla_cuerpo"></tbody>
                </table>
            </div>
            <div class="p-3 bg-emerald-700 flex justify-end gap-2">
                 <button onclick="saveAllNotas()" class="bg-white text-emerald-700 px-6 py-2 rounded font-black text-xs uppercase shadow-lg"><i class="fas fa-save mr-2"></i> Guardar Todo</button>
            </div>
        </div>
    </div>

    <script>
        // --- DATA MOCKUP & PERSISTENCIA ---
        const sesion = JSON.parse(sessionStorage.getItem('activeUser')) || { user: 'admin', fullname: 'MARIA PAULINA', role: 'Administrativo' };
        let currentMateria = null;
        let currentPeriodo = 1;
        let timerInterval = null;

        // Estructura de cronograma (Local Storage)
        let cronograma = JSON.parse(localStorage.getItem('db_cronograma')) || {
            1: { inicio: '2026-02-12T00:00', fin: '2026-04-24T23:59' },
            2: { inicio: '', fin: '' },
            3: { inicio: '', fin: '' }
        };

        // Lista de Estudiantes mockup
        const estudiantes = [
            { id: '13083', nombre: 'ABRIL OLARTE DAVID ALEJANDRO' },
            { id: '12137', nombre: 'ALARCÓN CARVAJAL DAVID SANTHIAGO' },
            { id: '11595', nombre: 'ANGULO COBOS AARON SNEIDER' }
        ];

        // Notas Storage
        let db_notas = JSON.parse(localStorage.getItem('db_notas')) || {};

        window.onload = function() {
            document.getElementById('navFullName').innerText = sesion.fullname;
            document.getElementById('navRole').innerText = sesion.role;
            const rol = sesion.role.toLowerCase();

            if(rol.includes('admin')) {
                document.getElementById('view-admin').classList.add('active');
                loadAdminData();
            } else {
                document.getElementById('view-docente').classList.add('active');
                renderMateriasDocente();
            }
            
            // Iniciar contadores globales si existen
            startGlobalTimers();
        };

        // --- FUNCIONES LOGICA ADMIN ---
        function loadAdminData() {
            // Cargar lista de docentes en el select
            const docs = [{user: 'doc1', fullname: 'Profe Juan'}]; // Mock
            document.getElementById('adm_doc_sel').innerHTML = docs.map(d => `<option value="${d.user}">${d.fullname}</option>`).join('');
        }

        function saveCronograma() {
            const p = document.getElementById('adm_periodo_sel').value;
            cronograma[p] = {
                inicio: document.getElementById('adm_fecha_inicio').value,
                fin: document.getElementById('adm_fecha_fin').value
            };
            localStorage.setItem('db_cronograma', JSON.stringify(cronograma));
            alert("Cronograma actualizado con éxito");
        }

        // --- FUNCIONES LOGICA DOCENTE ---
        function renderMateriasDocente() {
            const materias = [
                { id: 101, grupo: '09-3', grado: 'Noveno', nombre: 'Educación Religiosa', ubicacion: '2026->A PRINCIPAL->Mañana' },
                { id: 102, grupo: '07-2', grado: 'Séptimo', nombre: 'Tecnología - Emprendimiento', ubicacion: '2026->A PRINCIPAL->Mañana' }
            ];

            document.getElementById('lista_materias_doc').innerHTML = materias.map(m => `
                <tr class="hover:bg-gray-50 transition">
                    <td class="p-4 font-bold text-gray-600">${m.grupo}</td>
                    <td class="p-4">${m.grado}</td>
                    <td class="p-4 font-bold text-emerald-700">${m.nombre}</td>
                    <td class="p-4 text-[10px] text-gray-400">${m.ubicacion}</td>
                    <td class="p-4 text-center">
                        <button onclick="openPeriodos(${m.id}, '${m.nombre}')" class="bg-emerald-500 text-white px-3 py-1 rounded text-[10px] font-black uppercase hover:bg-emerald-600 transition">Notas</button>
                    </td>
                </tr>
            `).join('');
        }

        function openPeriodos(id, nombre) {
            currentMateria = { id, nombre };
            const container = document.getElementById('periodos_container');
            container.innerHTML = '';

            [1, 2, 3].forEach(p => {
                const c = cronograma[p];
                const hasDate = c.inicio && c.fin;
                
                const div = document.createElement('div');
                div.className = "border rounded-lg overflow-hidden";
                div.innerHTML = `
                    <div class="bg-gray-100 p-2 font-black text-center text-xs border-b uppercase">Periodo ${p}</div>
                    <div class="p-3 text-[11px] space-y-1">
                        <p><strong>Inicio:</strong> ${hasDate ? formatDate(c.inicio) : 'No definido'}</p>
                        <p><strong>Fin:</strong> ${hasDate ? formatDate(c.fin) : 'No definido'}</p>
                        <p id="timer_p${p}" class="text-red-500 font-bold italic"></p>
                    </div>
                    <div class="flex">
                        <button onclick="openPlanilla(${p})" class="flex-1 bg-emerald-500 text-white py-2 font-bold text-[10px] uppercase">Notas</button>
                        <button class="flex-1 bg-red-400 text-white py-2 font-bold text-[10px] uppercase">Offline</button>
                    </div>
                `;
                container.appendChild(div);
                if(hasDate) startCountdown(c.fin, `timer_p${p}`);
            });

            document.getElementById('modal_periodos').classList.add('active');
        }

        function openPlanilla(p) {
            currentPeriodo = p;
            closeModal('modal_periodos');
            document.getElementById('modal_planilla').classList.add('active');
            document.getElementById('planilla_titulo').innerText = `Periodo ${p} - ${currentMateria.nombre}`;
            
            const c = cronograma[p];
            if(c.fin) startCountdown(c.fin, 'planilla_countdown', "Cierre en: ");

            renderPlanillaRows();
        }

        function renderPlanillaRows() {
            const tbody = document.getElementById('planilla_cuerpo');
            tbody.innerHTML = estudiantes.map((est, index) => {
                const key = `${currentMateria.id}_${currentPeriodo}_${est.id}`;
                const n = db_notas[key] || {};
                
                return `
                    <tr class="border-b hover:bg-gray-50 text-[10px]">
                        <td class="p-2 font-bold bg-gray-50 border-r">${index + 1}. ${est.nombre}</td>
                        ${Array.from({length: 8}, (_, i) => `<td class="col-academic border"><input type="number" class="input-nota" data-est="${est.id}" data-tipo="acad" data-idx="${i}" value="${n[`acad_${i}`] || ''}"></td>`).join('')}
                        <td class="bg-purple-100 font-black text-center" id="sub_acad_${est.id}">0.0</td>
                        <td class="col-acumula border"><input type="number" class="input-nota" data-est="${est.id}" data-tipo="acum" value="${n.acum || ''}"></td>
                        ${Array.from({length: 3}, (_, i) => `<td class="col-perso border"><input type="number" class="input-nota" data-est="${est.id}" data-tipo="pers" data-idx="${i}" value="${n[`pers_${i}`] || ''}"></td>`).join('')}
                        ${Array.from({length: 3}, (_, i) => `<td class="col-social border"><input type="number" class="input-nota" data-est="${est.id}" data-tipo="soci" data-idx="${i}" value="${n[`soci_${i}`] || ''}"></td>`).join('')}
                        <td class="bg-gray-800 text-white font-black text-center" id="def_${est.id}">0.0</td>
                    </tr>
                `;
            }).join('');
        }

        function saveAllNotas() {
            const inputs = document.querySelectorAll('.input-nota');
            inputs.forEach(input => {
                const {est, tipo, idx} = input.dataset;
                const key = `${currentMateria.id}_${currentPeriodo}_${est}`;
                if(!db_notas[key]) db_notas[key] = {};
                
                const prop = idx !== undefined ? `${tipo}_${idx}` : tipo;
                db_notas[key][prop] = input.value;
            });
            localStorage.setItem('db_notas', JSON.stringify(db_notas));
            alert("Notas sincronizadas correctamente");
        }

        // --- UTILS ---
        function startCountdown(endDate, elementId, prefix = "Faltan ") {
            const target = new Date(endDate).getTime();
            const el = document.getElementById(elementId);
            
            const fn = () => {
                const now = new Date().getTime();
                const dist = target - now;
                if (dist < 0) {
                    el.innerHTML = "PERIODO CERRADO";
                    return;
                }
                const d = Math.floor(dist / (1000 * 60 * 60 * 24));
                const h = Math.floor((dist % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const m = Math.floor((dist % (1000 * 60 * 60)) / (1000 * 60));
                const s = Math.floor((dist % (1000 * 60)) / 1000);
                el.innerHTML = `${prefix} ${d}d ${h}h ${m}m ${s}s`;
            };
            fn();
            setInterval(fn, 1000);
        }

        function formatDate(dateStr) {
            const d = new Date(dateStr);
            return d.toLocaleDateString('es-CO', { day:'2-digit', month:'long', year:'numeric', hour:'2-digit', minute:'2-digit' });
        }

        function closeModal(id) { document.getElementById(id).classList.remove('active'); }
        function logout() { sessionStorage.clear(); location.reload(); }
    </script>
</body>
</html>
