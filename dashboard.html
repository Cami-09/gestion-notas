<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Integra Pro v3.5 | Acceso Total Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .sidebar-admin { background: #1e3a8a; }
        .sidebar-docente { background: #065f46; }
        .sidebar-estudiante { background: #3730a3; }
        .tab-content { display: none; }
        .tab-content.active { display: block !important; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .badge-bajo { background: #fee2e2; color: #991b1b; }
        .badge-basico { background: #fef3c7; color: #92400e; }
        .badge-alto { background: #dcfce7; color: #166534; }
        .badge-superior { background: #e0e7ff; color: #3730a3; }
    </style>
</head>
<body class="bg-gray-100 flex h-screen overflow-hidden text-sm">

    <aside id="sidebar" class="w-64 text-white flex flex-col shadow-2xl transition-all duration-300">
        <div class="p-6 border-b border-white/10 text-center">
            <h1 class="text-2xl font-black tracking-tighter uppercase italic">INTEGRA<span class="text-orange-500 text-sm">PRO</span></h1>
        </div>
        <nav class="mt-6 flex-1 px-4 space-y-2" id="menuOptions"></nav>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="bg-white p-4 shadow-md flex justify-between items-center px-8 border-b-4 border-orange-500">
            <div>
                <h2 class="text-xl font-black text-gray-800 uppercase italic">Panel de Control</h2>
                <p class="text-[10px] text-orange-600 font-bold uppercase" id="currentPeriodLabel">Cargando estado...</p>
            </div>
            <div class="flex items-center gap-4">
                <div class="text-right">
                    <p id="navFullName" class="font-bold text-gray-900 leading-none text-base"></p>
                    <p id="navRole" class="text-[10px] uppercase text-blue-600 font-black mt-1"></p>
                </div>
                <button onclick="logout()" class="w-10 h-10 bg-red-50 text-red-600 rounded-full flex items-center justify-center hover:bg-red-600 hover:text-white transition">
                    <i class="fas fa-power-off"></i>
                </button>
            </div>
        </header>

        <div class="p-6 overflow-y-auto h-full pb-32">
            
            <div id="view-admin" class="tab-content">
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
                    <div class="bg-white p-6 rounded-3xl shadow-sm border-t-4 border-purple-600">
                        <h3 class="font-black text-purple-700 uppercase text-xs mb-4"><i class="fas fa-cog mr-2"></i>Escala de Notas</h3>
                        <div class="space-y-3">
                            <div class="flex justify-between items-center"><span>Bajo:</span><input type="number" step="0.1" id="esc_bajo" class="w-16 border rounded text-center"></div>
                            <div class="flex justify-between items-center"><span>Básico:</span><input type="number" step="0.1" id="esc_basico" class="w-16 border rounded text-center"></div>
                            <div class="flex justify-between items-center"><span>Alto:</span><input type="number" step="0.1" id="esc_alto" class="w-16 border rounded text-center"></div>
                            <div class="flex justify-between items-center"><span>Superior:</span><input type="number" step="0.1" id="esc_superior" class="w-16 border rounded text-center"></div>
                        </div>
                        <button onclick="saveEscala()" class="w-full mt-4 bg-purple-600 text-white py-2 rounded-xl font-bold text-[10px]">GUARDAR CONFIGURACIÓN</button>
                    </div>

                    <div class="bg-white p-6 rounded-3xl shadow-sm border-t-4 border-blue-900">
                        <h3 class="font-black text-blue-900 uppercase text-xs mb-4"><i class="fas fa-calendar mr-2"></i>Fechas de Periodo</h3>
                        <select id="admin_p_select" class="w-full mb-2 p-2 border rounded-xl text-xs">
                            <option value="1">Periodo 1</option><option value="2">Periodo 2</option><option value="3">Periodo 3</option>
                        </select>
                        <input type="datetime-local" id="f_inicio" class="w-full mb-2 p-2 border rounded-lg text-xs">
                        <input type="datetime-local" id="f_cierre" class="w-full mb-2 p-2 border rounded-lg text-xs">
                        <button onclick="saveCronograma()" class="w-full bg-blue-900 text-white py-2 rounded-xl font-bold text-[10px]">ACTIVAR FECHAS</button>
                    </div>

                    <div class="bg-white p-6 rounded-3xl shadow-sm border-t-4 border-gray-800">
                        <h3 class="font-black text-gray-800 uppercase text-xs mb-4"><i class="fas fa-users mr-2"></i>Crear Cuentas</h3>
                        <input type="text" id="reg_name" placeholder="Nombre" class="w-full mb-2 p-2 border rounded-xl text-xs">
                        <div class="flex gap-2 mb-2">
                            <input type="text" id="reg_user" placeholder="ID" class="w-1/2 p-2 border rounded-xl text-xs">
                            <input type="text" id="reg_pass" placeholder="Clave" class="w-1/2 p-2 border rounded-xl text-xs">
                        </div>
                        <select id="reg_role" class="w-full mb-2 p-2 border rounded-xl text-xs">
                            <option value="Estudiante">Estudiante</option><option value="Docente">Docente</option><option value="Administrativo">Administrativo</option>
                        </select>
                        <button onclick="register()" class="w-full bg-black text-white py-2 rounded-xl font-bold text-[10px]">REGISTRAR</button>
                    </div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <div class="bg-white p-6 rounded-3xl shadow-sm border-t-4 border-orange-500">
                        <h3 class="font-black text-orange-600 uppercase text-xs mb-4 italic">Asignación de Materias</h3>
                        <div class="flex gap-2 mb-4">
                            <input type="text" id="mat_name" placeholder="Materia" class="flex-1 p-2 border rounded-xl text-xs">
                            <select id="sel_doc" class="flex-1 p-2 border rounded-xl text-xs"></select>
                            <button onclick="addMateria()" class="bg-orange-600 text-white px-4 rounded-xl font-bold text-[10px]">CREAR</button>
                        </div>
                        <div class="p-3 bg-green-50 rounded-2xl flex gap-2">
                            <select id="sel_est" class="flex-1 p-2 border rounded-xl text-xs"></select>
                            <select id="sel_mat" class="flex-1 p-2 border rounded-xl text-xs"></select>
                            <button onclick="matricular()" class="bg-green-600 text-white px-4 rounded-xl font-bold text-[10px]">VINCULAR</button>
                        </div>
                    </div>
                    <div class="bg-white rounded-3xl shadow-sm border overflow-hidden">
                        <div class="p-4 bg-gray-50 border-b font-black text-gray-400 text-[10px]">BASE DE DATOS</div>
                        <div class="max-h-48 overflow-y-auto"><table class="w-full text-left"><tbody id="table_users"></tbody></table></div>
                    </div>
                </div>
            </div>

            <div id="view-docente" class="tab-content"><div id="doc_grid" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div></div>

            <div id="view-estudiante" class="tab-content"><div id="est_boletin" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div></div>
        </div>
    </main>

    <script>
        // --- INICIO CRÍTICO ---
        const sesion = JSON.parse(sessionStorage.getItem('activeUser'));
        if(!sesion) window.location.href = 'index.html';

        window.onload = () => {
            // 1. Forzar visibilidad
            const rolLimpio = sesion.role.toLowerCase().trim();
            document.getElementById('navFullName').innerText = sesion.fullname || sesion.user;
            document.getElementById('navRole').innerText = sesion.role;
            
            // Limpiar todas las vistas y activar la correcta
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            const vistaActual = document.getElementById('view-' + rolLimpio);
            if(vistaActual) vistaActual.classList.add('active');

            // 2. Carga de datos
            actualizarEstadoCronograma();
            if(rolLimpio === 'administrativo') loadAdmin();
            if(rolLimpio === 'docente') loadDocente();
            if(rolLimpio === 'estudiante') loadEstudiante();

            // 3. Menú
            document.getElementById('menuOptions').innerHTML = `<button class="w-full text-left p-3 bg-white/10 rounded-xl font-bold text-[10px] uppercase italic"><i class="fas fa-home mr-3"></i> Menú Principal</button>`;
            document.getElementById('sidebar').className = `w-64 text-white flex flex-col shadow-2xl sidebar-${rolLimpio}`;
        };

        function getEscala() {
            const def = { bajo: 2.9, basico: 3.9, alto: 4.5, superior: 5.0 };
            try { return JSON.parse(localStorage.getItem('db_escala')) || def; } catch(e) { return def; }
        }

        function actualizarEstadoCronograma() {
            const crono = JSON.parse(localStorage.getItem('cronograma')) || {};
            const ahora = new Date();
            let msg = "PLAZOS DE CARGA CERRADOS";
            for(let p in crono) {
                if(ahora >= new Date(crono[p].inicio) && ahora <= new Date(crono[p].cierre)) msg = "SISTEMA ABIERTO: PERIODO " + p;
            }
            document.getElementById('currentPeriodLabel').innerText = msg;
        }

        function loadAdmin() {
            const esc = getEscala();
            document.getElementById('esc_bajo').value = esc.bajo;
            document.getElementById('esc_basico').value = esc.basico;
            document.getElementById('esc_alto').value = esc.alto;
            document.getElementById('esc_superior').value = esc.superior;

            let users = [];
            for(let i=0; i<localStorage.length; i++) {
                let k = localStorage.key(i);
                if(['db_materias','db_notas','activeUser','cronograma','db_escala'].includes(k)) continue;
                try { users.push(JSON.parse(localStorage.getItem(k))); } catch(e){}
            }

            document.getElementById('table_users').innerHTML = users.map(u => `
                <tr class="text-[10px] border-b">
                    <td class="p-2 font-bold">${u.fullname} (@${u.user})</td>
                    <td class="p-2 font-black text-blue-700">${u.role.toUpperCase()}</td>
                    <td class="p-2 text-right"><button onclick="deleteUser('${u.user}')" class="text-red-400"><i class="fas fa-trash"></i></button></td>
                </tr>`).join('');

            const docs = users.filter(u => u.role.toLowerCase() === 'docente');
            const ests = users.filter(u => u.role.toLowerCase() === 'estudiante');
            document.getElementById('sel_doc').innerHTML = docs.map(d => `<option value="${d.user}">${d.fullname}</option>`).join('');
            document.getElementById('sel_est').innerHTML = ests.map(e => `<option value="${e.user}">${e.fullname}</option>`).join('');
            const mats = JSON.parse(localStorage.getItem('db_materias')) || [];
            document.getElementById('sel_mat').innerHTML = mats.map(m => `<option value="${m.id}">${m.nombre}</option>`).join('');
        }

        function saveEscala() {
            const e = {
                bajo: parseFloat(document.getElementById('esc_bajo').value),
                basico: parseFloat(document.getElementById('esc_basico').value),
                alto: parseFloat(document.getElementById('esc_alto').value),
                superior: parseFloat(document.getElementById('esc_superior').value)
            };
            localStorage.setItem('db_escala', JSON.stringify(e));
            alert("Escala guardada.");
        }

        function saveCronograma() {
            const p = document.getElementById('admin_p_select').value;
            const i = document.getElementById('f_inicio').value;
            const c = document.getElementById('f_cierre').value;
            if(!i || !c) return alert("Define fechas.");
            let cro = JSON.parse(localStorage.getItem('cronograma')) || {};
            cro[p] = { inicio: i, cierre: c };
            localStorage.setItem('cronograma', JSON.stringify(cro));
            alert("Periodo " + p + " activado.");
            actualizarEstadoCronograma();
        }

        function register() {
            const u = document.getElementById('reg_user').value, p = document.getElementById('reg_pass').value, n = document.getElementById('reg_name').value, r = document.getElementById('reg_role').value;
            if(!u || !p || !n) return;
            localStorage.setItem(u, JSON.stringify({user:u, pass:p, fullname:n, role:r}));
            loadAdmin();
        }

        function addMateria() {
            const n = document.getElementById('mat_name').value, d = document.getElementById('sel_doc').value;
            if(!n) return;
            let m = JSON.parse(localStorage.getItem('db_materias')) || [];
            m.push({id: Date.now(), nombre: n, docente: d, matriculados: []});
            localStorage.setItem('db_materias', JSON.stringify(m));
            loadAdmin();
        }

        function matricular() {
            const e = document.getElementById('sel_est').value, mId = document.getElementById('sel_mat').value;
            let m = JSON.parse(localStorage.getItem('db_materias')) || [];
            const i = m.findIndex(x => x.id == mId);
            if(i > -1 && !m[i].matriculados.includes(e)) {
                m[i].matriculados.push(e);
                localStorage.setItem('db_materias', JSON.stringify(m));
                alert("Vinculado.");
            }
        }

        function logout() { sessionStorage.clear(); window.location.href = 'index.html'; }
        function deleteUser(u) { if(confirm("¿Eliminar?")){ localStorage.removeItem(u); loadAdmin(); } }
    </script>
</body>
</html>
