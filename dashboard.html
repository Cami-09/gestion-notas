<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plataforma Integra Pro | Sistema Académico</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .sidebar-admin { background: #1e3a8a; }
        .sidebar-docente { background: #065f46; }
        .sidebar-estudiante { background: #3730a3; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
    </style>
</head>
<body class="bg-gray-100 flex h-screen overflow-hidden text-sm">

    <aside id="sidebar" class="w-64 text-white flex flex-col shadow-2xl transition-all">
        <div class="p-6 border-b border-white/10 text-center">
            <h1 class="text-2xl font-black tracking-tighter uppercase italic">INTEGRA<span class="text-orange-500 text-sm">PRO</span></h1>
        </div>
        <nav class="mt-6 flex-1 px-4 space-y-2" id="menuOptions"></nav>
        <div class="p-4 bg-black/20 text-center">
            <button onclick="logout()" class="w-full py-2 bg-red-600 rounded-lg font-bold hover:bg-red-700 transition">
                <i class="fas fa-sign-out-alt mr-2"></i>CERRAR SESIÓN
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="bg-white p-4 shadow-md flex justify-between items-center px-8 border-b-4 border-orange-500">
            <div class="flex flex-col">
                <h2 id="viewTitle" class="text-xl font-black text-gray-800 uppercase tracking-tight">Panel Principal</h2>
                <div id="cronogramaLabel" class="text-[10px] font-bold text-gray-400 uppercase mt-1"></div>
            </div>
            <div class="flex items-center gap-4">
                <div class="text-right">
                    <p id="navFullName" class="font-bold text-gray-900 leading-none text-base"></p>
                    <p id="navRole" class="text-[10px] uppercase text-orange-600 font-black mt-1"></p>
                </div>
                <div id="userAvatar" class="w-12 h-12 rounded-full bg-orange-500 flex items-center justify-center text-white font-black text-lg shadow-inner"></div>
            </div>
        </header>

        <div class="p-6 overflow-y-auto h-full pb-24">
            
            <div id="view-admin" class="tab-content">
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
                    <div class="bg-white p-6 rounded-2xl shadow-sm border-t-4 border-blue-800">
                        <h3 class="font-black text-blue-900 uppercase text-xs mb-4"><i class="fas fa-clock mr-2"></i>Fechas de Notas</h3>
                        <label class="text-[10px] font-bold text-gray-400">APERTURA</label>
                        <input type="datetime-local" id="f_inicio" class="w-full mb-3 p-2 border rounded-lg text-xs outline-none focus:ring-2 focus:ring-blue-500">
                        <label class="text-[10px] font-bold text-gray-400">CIERRE</label>
                        <input type="datetime-local" id="f_cierre" class="w-full mb-4 p-2 border rounded-lg text-xs outline-none focus:ring-2 focus:ring-red-500">
                        <button onclick="guardarFechas()" class="w-full bg-blue-900 text-white py-2 rounded-lg font-bold hover:bg-blue-800 transition">ACTUALIZAR PLAZOS</button>
                    </div>

                    <div class="bg-white p-6 rounded-2xl shadow-sm border-t-4 border-blue-800">
                        <h3 class="font-black text-blue-900 uppercase text-xs mb-4"><i class="fas fa-user-plus mr-2"></i>Registrar Persona</h3>
                        <input type="text" id="reg_name" placeholder="Nombre Completo" class="w-full mb-2 p-2 border rounded-lg text-xs">
                        <div class="flex gap-2 mb-2">
                            <input type="text" id="reg_user" placeholder="Usuario" class="w-1/2 p-2 border rounded-lg text-xs">
                            <input type="text" id="reg_pass" placeholder="Clave" class="w-1/2 p-2 border rounded-lg text-xs">
                        </div>
                        <select id="reg_role" class="w-full mb-4 p-2 border rounded-lg text-xs bg-gray-50">
                            <option value="Estudiante">Estudiante</option>
                            <option value="Docente">Docente</option>
                            <option value="Administrativo">Administrativo</option>
                        </select>
                        <button onclick="registrarUsuario()" class="w-full bg-gray-900 text-white py-2 rounded-lg font-bold hover:bg-black transition">CREAR CUENTA</button>
                    </div>

                    <div class="bg-white p-6 rounded-2xl shadow-sm border-t-4 border-orange-500">
                        <h3 class="font-black text-orange-600 uppercase text-xs mb-4"><i class="fas fa-book mr-2"></i>Crear Materia</h3>
                        <input type="text" id="mat_nombre" placeholder="Nombre de la Materia" class="w-full mb-2 p-2 border rounded-lg text-xs">
                        <select id="sel_doc" class="w-full mb-4 p-2 border rounded-lg text-xs bg-gray-50"></select>
                        <button onclick="crearMateria()" class="w-full bg-orange-600 text-white py-2 rounded-lg font-bold hover:bg-orange-700 transition">ASIGNAR A DOCENTE</button>
                    </div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <div class="bg-white rounded-2xl shadow-sm border overflow-hidden">
                        <div class="p-4 bg-gray-50 border-b font-black text-gray-500 text-[10px] uppercase tracking-widest">Usuarios Activos</div>
                        <div class="overflow-x-auto"><table class="w-full text-left"><tbody id="lista_usuarios_admin" class="divide-y"></tbody></table></div>
                    </div>
                    <div class="bg-white p-6 rounded-2xl shadow-sm border-t-4 border-green-600">
                        <h3 class="font-black text-green-700 uppercase text-xs mb-4">Matricular Estudiantes</h3>
                        <select id="sel_est" class="w-full mb-2 p-2 border rounded-lg text-xs"></select>
                        <select id="sel_mat" class="w-full mb-4 p-2 border rounded-lg text-xs"></select>
                        <button onclick="matricularEstudiante()" class="w-full bg-green-600 text-white py-2 rounded-lg font-bold hover:bg-green-700 transition">MATRICULAR EN MATERIA</button>
                    </div>
                </div>
            </div>

            <div id="view-docente" class="tab-content">
                <div id="grid_materias_doc" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
            </div>

            <div id="view-estudiante" class="tab-content">
                <div id="boletin_estudiante" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
            </div>

        </div>
    </main>

    <div id="modal_notas" class="modal">
        <div class="bg-white w-full max-w-4xl mx-4 rounded-3xl shadow-2xl overflow-hidden flex flex-col animate-bounce-in">
            <div class="p-6 bg-gray-900 text-white flex justify-between items-center">
                <div>
                    <h3 id="m_materia_name" class="font-black uppercase text-sm tracking-widest">NOMBRE MATERIA</h3>
                    <p class="text-[10px] text-gray-400 font-bold uppercase">Planilla Oficial de Calificaciones</p>
                </div>
                <button onclick="cerrarModal()" class="text-2xl hover:text-red-500 transition">&times;</button>
            </div>
            
            <div class="flex bg-gray-100 border-b">
                <button onclick="cambiarPeriodo(1)" id="p_btn_1" class="flex-1 py-4 font-black text-xs uppercase transition-all">Periodo 1</button>
                <button onclick="cambiarPeriodo(2)" id="p_btn_2" class="flex-1 py-4 font-black text-xs uppercase transition-all">Periodo 2</button>
                <button onclick="cambiarPeriodo(3)" id="p_btn_3" class="flex-1 py-4 font-black text-xs uppercase transition-all">Periodo 3</button>
            </div>

            <div class="p-6 overflow-y-auto max-h-[60vh]">
                <div id="status_alerta" class="mb-4 p-3 rounded-xl text-[10px] font-black text-center uppercase"></div>
                <table class="w-full text-left">
                    <thead>
                        <tr class="text-[10px] text-gray-400 uppercase border-b">
                            <th class="pb-3">Nombre del Estudiante</th>
                            <th class="pb-3 text-center">Nota 1 (30%)</th>
                            <th class="pb-3 text-center">Nota 2 (30%)</th>
                            <th class="pb-3 text-center">Examen (40%)</th>
                            <th class="pb-3 text-center">Definitiva</th>
                        </tr>
                    </thead>
                    <tbody id="planilla_body" class="divide-y"></tbody>
                </table>
            </div>
            
            <div class="p-6 bg-gray-50 border-t flex justify-end">
                <button onclick="cerrarModal()" class="bg-gray-800 text-white px-8 py-2 rounded-xl font-bold text-xs">CERRAR PLANILLA</button>
            </div>
        </div>
    </div>

    <script>
        // --- CONFIGURACIÓN INICIAL ---
        const sesion = JSON.parse(sessionStorage.getItem('activeUser'));
        if(!sesion) window.location.href = 'index.html';

        let curMatId = null;
        let curPer = 1;

        window.onload = function() {
            try {
                actualizarHeader();
                renderizarMenu();
                cargarDatosSegunRol();
            } catch (e) {
                console.error("Error al cargar panel:", e);
                alert("Error de datos. Limpia el LocalStorage.");
            }
        };

        function actualizarHeader() {
            document.getElementById('navFullName').innerText = sesion.fullname || sesion.user;
            document.getElementById('navRole').innerText = sesion.role;
            document.getElementById('userAvatar').innerText = (sesion.fullname || sesion.user)[0].toUpperCase();
            
            const i = localStorage.getItem('f_inicio') || 'No def.';
            const c = localStorage.getItem('f_cierre') || 'No def.';
            document.getElementById('cronogramaLabel').innerHTML = `Apertura: ${i.replace('T',' ')} | Cierre: ${c.replace('T',' ')}`;
        }

        function renderizarMenu() {
            const menu = document.getElementById('menuOptions');
            const side = document.getElementById('sidebar');
            const icon = (sesion.role === 'Administrativo') ? 'fa-university' : (sesion.role === 'Docente' ? 'fa-chalkboard-teacher' : 'fa-user-graduate');
            const label = (sesion.role === 'Administrativo') ? 'ADMINISTRACIÓN' : (sesion.role === 'Docente' ? 'MIS ASIGNATURAS' : 'MI BOLETÍN');
            
            side.classList.add(sesion.role === 'Administrativo' ? 'sidebar-admin' : (sesion.role === 'Docente' ? 'sidebar-docente' : 'sidebar-estudiante'));
            menu.innerHTML = `<button class="w-full text-left p-3 bg-white/10 rounded-xl font-bold text-xs uppercase tracking-widest"><i class="fas ${icon} mr-3"></i> ${label}</button>`;
        }

        function cargarDatosSegunRol() {
            if(sesion.role === 'Administrativo') {
                showTab('admin');
                actualizarVistasAdmin();
            } else if(sesion.role === 'Docente') {
                showTab('docente');
                cargarMateriasDocente();
            } else {
                showTab('estudiante');
                cargarBoletinEstudiante();
            }
        }

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById('view-'+id).classList.add('active');
            document.getElementById('viewTitle').innerText = "Panel " + id;
        }

        // --- LÓGICA ADMINISTRADOR ---
        function registrarUsuario() {
            const u = document.getElementById('reg_user').value.trim();
            const p = document.getElementById('reg_pass').value.trim();
            const r = document.getElementById('reg_role').value;
            const n = document.getElementById('reg_name').value.trim();
            if(!u || !p || !n) return alert("Faltan campos");
            localStorage.setItem(u, JSON.stringify({user:u, pass:p, role:r, fullname:n}));
            location.reload();
        }

        function actualizarVistasAdmin() {
            const usuarios = [];
            for(let i=0; i<localStorage.length; i++){
                let k = localStorage.key(i);
                if(['f_inicio','f_cierre','db_materias','db_notas'].includes(k)) continue;
                usuarios.push(JSON.parse(localStorage.getItem(k)));
            }

            // Tabla de usuarios
            document.getElementById('lista_usuarios_admin').innerHTML = usuarios.map(u => `
                <tr class="text-xs hover:bg-gray-50">
                    <td class="p-3 font-black text-gray-800">${u.fullname} <span class="text-gray-400 font-normal">(@${u.user})</span></td>
                    <td class="p-3 uppercase text-[9px] font-black">${u.role}</td>
                    <td class="p-3 text-right"><button onclick="borrarUsuario('${u.user}')" class="text-red-400 hover:text-red-600"><i class="fas fa-trash"></i></button></td>
                </tr>
            `).join('');

            // Selects de Docentes y Estudiantes
            const docs = usuarios.filter(u => u.role === 'Docente');
            const ests = usuarios.filter(u => u.role === 'Estudiante');
            document.getElementById('sel_doc').innerHTML = docs.map(d => `<option value="${d.user}">${d.fullname}</option>`).join('');
            document.getElementById('sel_est').innerHTML = ests.map(e => `<option value="${e.user}">${e.fullname}</option>`).join('');
            
            const materias = JSON.parse(localStorage.getItem('db_materias')) || [];
            document.getElementById('sel_mat').innerHTML = materias.map(m => `<option value="${m.id}">${m.nombre}</option>`).join('');
        }

        function crearMateria() {
            const n = document.getElementById('mat_nombre').value.trim();
            const d = document.getElementById('sel_doc').value;
            if(!n) return;
            const materias = JSON.parse(localStorage.getItem('db_materias')) || [];
            materias.push({id: Date.now(), nombre: n, docente: d, matriculados: []});
            localStorage.setItem('db_materias', JSON.stringify(materias));
            location.reload();
        }

        function matricularEstudiante() {
            const e = document.getElementById('sel_est').value;
            const mId = document.getElementById('sel_mat').value;
            let materias = JSON.parse(localStorage.getItem('db_materias')) || [];
            const idx = materias.findIndex(m => m.id == mId);
            if(idx > -1 && !materias[idx].matriculados.includes(e)) {
                materias[idx].matriculados.push(e);
                localStorage.setItem('db_materias', JSON.stringify(materias));
                alert("Estudiante matriculado");
            }
        }

        function guardarFechas() {
            localStorage.setItem('f_inicio', document.getElementById('f_inicio').value);
            localStorage.setItem('f_cierre', document.getElementById('f_cierre').value);
            alert("Cronograma actualizado.");
            location.reload();
        }

        function borrarUsuario(u) { if(confirm("¿Eliminar usuario?")){localStorage.removeItem(u); location.reload();}}

        // --- LÓGICA DOCENTE ---
        function cargarMateriasDocente() {
            const mats = JSON.parse(localStorage.getItem('db_materias')) || [];
            const misMats = mats.filter(m => m.docente === sesion.user);
            const container = document.getElementById('grid_materias_doc');
            
            if(misMats.length === 0) container.innerHTML = "<p class='col-span-3 text-center text-gray-400 font-bold'>No tienes materias asignadas.</p>";
            
            container.innerHTML = misMats.map(m => `
                <div class="bg-white p-6 rounded-3xl shadow-sm border-b-8 border-green-600 hover:shadow-xl transition">
                    <div class="w-12 h-12 bg-green-100 text-green-600 rounded-2xl flex items-center justify-center mb-4"><i class="fas fa-book text-xl"></i></div>
                    <h3 class="font-black text-gray-800 uppercase text-sm">${m.nombre}</h3>
                    <p class="text-[10px] text-gray-400 font-bold mb-6">${m.matriculados.length} ESTUDIANTES</p>
                    <button onclick="abrirPlanilla(${m.id})" class="w-full bg-green-600 text-white py-3 rounded-2xl font-black text-[10px] uppercase tracking-widest hover:bg-green-700 transition">Calificar Notas</button>
                </div>
            `).join('');
        }

        function abrirPlanilla(id) {
            curMatId = id;
            const mats = JSON.parse(localStorage.getItem('db_materias')) || [];
            const m = mats.find(x => x.id == id);
            document.getElementById('m_materia_name').innerText = m.nombre;
            document.getElementById('modal_notas').classList.add('active');
            cambiarPeriodo(1);
        }

        function cambiarPeriodo(p) {
            curPer = p;
            document.querySelectorAll('[id^="p_btn_"]').forEach(b => b.className = "flex-1 py-4 font-black text-xs uppercase transition-all text-gray-400");
            document.getElementById('p_btn_'+p).className = "flex-1 py-4 font-black text-xs uppercase transition-all bg-white text-green-600 border-b-4 border-green-600";
            renderizarTablaNotas();
        }

        function renderizarTablaNotas() {
            const mats = JSON.parse(localStorage.getItem('db_materias')) || [];
            const m = mats.find(x => x.id == curMatId);
            const dbNotas = JSON.parse(localStorage.getItem('db_notas')) || {};
            const alerta = document.getElementById('status_alerta');
            const locked = !verificarPlazo();

            alerta.innerText = locked ? "SISTEMA CERRADO - SOLO LECTURA" : "SISTEMA ABIERTO - MODO EDICIÓN";
            alerta.className = "mb-4 p-3 rounded-xl text-[10px] font-black text-center uppercase " + (locked ? "bg-red-100 text-red-600" : "bg-green-100 text-green-600");

            document.getElementById('planilla_body').innerHTML = m.matriculados.map(estUser => {
                const estData = JSON.parse(localStorage.getItem(estUser)) || {fullname: estUser};
                const key = `${curMatId}_${curPer}_${estUser}`;
                const n = dbNotas[key] || {n1:0, n2:0, n3:0};
                const def = (n.n1*0.3 + n.n2*0.3 + n.n3*0.4).toFixed(1);
                
                return `
                    <tr class="text-xs">
                        <td class="py-3 font-bold text-gray-700">${estData.fullname}</td>
                        <td class="py-3 text-center"><input type="number" step="0.1" value="${n.n1}" onchange="salvarNota('${estUser}',1,this.value)" ${locked?'disabled':''} class="w-12 border rounded p-1 text-center font-bold"></td>
                        <td class="py-3 text-center"><input type="number" step="0.1" value="${n.n2}" onchange="salvarNota('${estUser}',2,this.value)" ${locked?'disabled':''} class="w-12 border rounded p-1 text-center font-bold"></td>
                        <td class="py-3 text-center"><input type="number" step="0.1" value="${n.n3}" onchange="salvarNota('${estUser}',3,this.value)" ${locked?'disabled':''} class="w-12 border rounded p-1 text-center font-bold"></td>
                        <td class="py-3 text-center font-black text-blue-600">${def}</td>
                    </tr>
                `;
            }).join('');
        }

        function salvarNota(est, num, val) {
            let db = JSON.parse(localStorage.getItem('db_notas')) || {};
            const key = `${curMatId}_${curPer}_${est}`;
            if(!db[key]) db[key] = {n1:0, n2:0, n3:0};
            db[key]['n'+num] = parseFloat(val) || 0;
            localStorage.setItem('db_notas', JSON.stringify(db));
            renderizarTablaNotas();
        }

        // --- LÓGICA ESTUDIANTE ---
        function cargarBoletinEstudiante() {
            const mats = JSON.parse(localStorage.getItem('db_materias')) || [];
            const dbN = JSON.parse(localStorage.getItem('db_notas')) || {};
            const misMats = mats.filter(m => m.matriculados.includes(sesion.user));
            const container = document.getElementById('boletin_estudiante');

            if(misMats.length === 0) container.innerHTML = "<p class='col-span-2 text-center text-gray-400 font-bold'>No estás matriculado en ninguna materia.</p>";

            container.innerHTML = misMats.map(m => {
                let p_html = `<div class="bg-white p-6 rounded-3xl shadow-sm border-l-8 border-indigo-600">
                    <h3 class="font-black text-indigo-900 uppercase text-xs mb-4">${m.nombre}</h3>
                    <div class="grid grid-cols-3 gap-2">`;
                for(let p=1; p<=3; p++){
                    const key = `${m.id}_${p}_${sesion.user}`;
                    const n = dbN[key] || {n1:0, n2:0, n3:0};
                    const f = (n.n1*0.3 + n.n2*0.3 + n.n3*0.4).toFixed(1);
                    p_html += `<div class="bg-gray-50 p-3 rounded-2xl text-center">
                        <p class="text-[8px] font-black text-gray-400 uppercase">Per ${p}</p>
                        <p class="text-lg font-black text-indigo-600">${f}</p>
                    </div>`;
                }
                p_html += `</div></div>`;
                return p_html;
            }).join('');
        }

        // --- HELPERS ---
        function verificarPlazo() {
            const ahora = new Date();
            const i = localStorage.getItem('f_inicio') ? new Date(localStorage.getItem('f_inicio')) : null;
            const c = localStorage.getItem('f_cierre') ? new Date(localStorage.getItem('f_cierre')) : null;
            if(!i || !c) return false;
            return (ahora >= i && ahora <= c);
        }

        function cerrarModal() { document.getElementById('modal_notas').classList.remove('active'); }
        function logout() { sessionStorage.clear(); window.location.href = 'index.html'; }
    </script>
</body>
</html>
