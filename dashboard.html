<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Integra Pro v27.0 | Sistema Unificado Total</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .sidebar-admin { background: #1e293b; }
        .sidebar-docente { background: #065f46; }
        .sidebar-estudiante { background: #3730a3; }
        .tab-content { display: none; }
        .tab-content.active { display: block !important; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; align-items: center; justify-content: center; padding: 15px; }
        .modal.active { display: flex; }
        .input-nota { width: 45px; height: 30px; border: 1px solid #cbd5e1; text-align: center; font-size: 11px; border-radius: 4px; font-weight: bold; }
        .input-desc { width: 100%; min-width: 150px; font-size: 10px; padding: 4px; border: 1px solid #e2e8f0; border-radius: 4px; }
        .input-nota:disabled, .input-desc:disabled { background: #f1f5f9; cursor: not-allowed; opacity: 0.7; }
        .accordion-content { max-height: 0; overflow: hidden; transition: all 0.3s ease-in-out; }
        .accordion-content.open { max-height: 5000px; padding: 10px; }
        .nota-red { color: #ef4444 !important; } 
        .nota-orange { color: #f97316 !important; } 
        .nota-green { color: #10b981 !important; }
        .input-item-name { background: transparent; border: none; border-bottom: 1px dashed rgba(255,255,255,0.5); color: white; text-align: center; font-weight: 900; text-transform: uppercase; width: 80%; cursor: edit; }
        .input-item-name:focus { outline: none; border-bottom-style: solid; }
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-100 flex h-screen overflow-hidden text-sm">

    <aside id="sidebar" class="w-64 text-white flex flex-col shadow-2xl transition-all duration-300">
        <div class="p-6 border-b border-white/10 flex items-center gap-3">
            <div class="bg-orange-500 p-2 rounded-xl shadow-lg"><i class="fas fa-graduation-cap text-xl"></i></div>
            <h1 class="text-xl font-black italic tracking-tighter uppercase">INTEGRA<span class="text-orange-500 text-[10px] ml-1">PRO</span></h1>
        </div>
        <nav id="menu-nav" class="mt-6 flex-1 px-4 space-y-2"></nav>
        <div class="p-4 bg-black/20 text-[10px] text-center font-black opacity-40 uppercase tracking-widest">v27.0 Admin Elite</div>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="bg-white p-4 shadow-sm flex justify-between items-center px-8 border-b-2 border-orange-500">
            <h2 id="view-title" class="text-lg font-black text-gray-800 uppercase italic">Cargando...</h2>
            <div class="flex items-center gap-4 text-right">
                <div>
                    <p id="navFullName" class="font-bold text-gray-900 leading-none text-base"></p>
                    <p id="navRole" class="text-[10px] uppercase text-orange-600 font-black mt-1 tracking-widest"></p>
                </div>
                <button onclick="logout()" class="w-10 h-10 bg-red-50 text-red-600 rounded-full flex items-center justify-center hover:bg-red-600 hover:text-white transition shadow-sm">
                    <i class="fas fa-power-off"></i>
                </button>
            </div>
        </header>

        <div class="p-6 overflow-y-auto h-full pb-24">
            
            <div id="view-admin-main" class="tab-content space-y-6">
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-200">
                        <h3 class="font-black text-xs uppercase mb-4 text-orange-600 border-b pb-2">Registro de Usuarios</h3>
                        <div class="grid grid-cols-2 gap-4">
                            <input type="text" id="adm_u_name" placeholder="Nombre Completo" class="p-3 border rounded-xl text-xs bg-gray-50">
                            <input type="text" id="adm_u_user" placeholder="Usuario ID" class="p-3 border rounded-xl text-xs bg-gray-50">
                            <input type="password" id="adm_u_pass" placeholder="Contraseña" class="p-3 border rounded-xl text-xs bg-gray-50">
                            <select id="adm_u_role" class="p-3 border rounded-xl text-xs font-bold">
                                <option value="Estudiante">Estudiante</option>
                                <option value="Docente">Docente</option>
                                <option value="Administrativo">Administrativo</option>
                            </select>
                        </div>
                        <button onclick="saveUser()" class="w-full mt-4 bg-gray-800 text-white py-3 rounded-2xl font-black text-[10px] uppercase shadow-lg">Crear Usuario</button>
                    </div>

                    <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-200">
                        <h3 class="font-black text-xs uppercase mb-4 text-blue-600 border-b pb-2">Gestión Académica</h3>
                        <div class="space-y-4">
                            <div class="flex gap-2">
                                <input type="text" id="adm_m_name" placeholder="Nueva Asignatura" class="flex-1 p-3 border rounded-xl text-xs">
                                <button onclick="saveMateria()" class="bg-blue-600 text-white px-6 rounded-xl font-black text-[10px] uppercase">Crear</button>
                            </div>
                            <div class="flex gap-2 p-3 bg-blue-50 rounded-2xl">
                                <select id="sel_dest_mat" class="flex-1 p-2 border rounded-lg text-[10px] font-bold"></select>
                                <select id="sel_dest_user" class="flex-1 p-2 border rounded-lg text-[10px]"></select>
                                <button onclick="matricularAction()" class="bg-orange-500 text-white px-4 py-2 rounded-lg font-black text-[10px] uppercase shadow-md">Vincular</button>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="bg-white rounded-3xl shadow-sm border overflow-hidden">
                        <div class="p-4 bg-gray-800 text-white font-black text-[10px] uppercase italic">Lista de Usuarios</div>
                        <div id="list_users" class="max-h-64 overflow-y-auto divide-y divide-gray-100"></div>
                    </div>
                    <div class="bg-white rounded-3xl shadow-sm border overflow-hidden">
                        <div class="p-4 bg-gray-800 text-white font-black text-[10px] uppercase italic">Lista de Materias</div>
                        <div id="list_mats" class="max-h-64 overflow-y-auto divide-y divide-gray-100"></div>
                    </div>
                </div>
            </div>

            <div id="view-admin-config" class="tab-content">
                <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border-t-8 border-indigo-600">
                    <h3 class="font-black text-xs uppercase text-indigo-600 mb-8 italic">Configuración Global</h3>
                    <div id="config_items_container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6"></div>
                    <div id="config_periods_container" class="grid grid-cols-1 md:grid-cols-3 gap-6 mt-10 pt-10 border-t border-dashed"></div>
                    
                    <div class="mt-8 p-6 bg-gray-50 rounded-3xl border">
                        <h4 class="font-black text-[10px] uppercase mb-4 italic text-indigo-600">Límites de Rúbrica</h4>
                        <div class="grid grid-cols-3 gap-6">
                            <div><label class="text-[9px] font-bold text-red-500 uppercase">Tope Rojo</label><input type="number" id="rub_bajo_input" class="w-full p-2 border rounded-lg"></div>
                            <div><label class="text-[9px] font-bold text-orange-500 uppercase">Tope Naranja</label><input type="number" id="rub_basico_input" class="w-full p-2 border rounded-lg"></div>
                            <div><label class="text-[9px] font-bold text-green-500 uppercase">Tope Verde</label><input type="number" id="rub_alto_input" class="w-full p-2 border rounded-lg"></div>
                        </div>
                    </div>
                    <button onclick="saveGlobalConfig()" class="mt-8 bg-indigo-600 text-white px-12 py-3 rounded-2xl font-black text-xs uppercase shadow-xl hover:scale-105 transition">Guardar Todo</button>
                </div>
            </div>

            <div id="view-docente-mats" class="tab-content">
                <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
                    <table class="w-full text-left">
                        <thead class="bg-gray-50 text-[10px] font-black uppercase text-gray-400 border-b">
                            <tr><th class="p-5">Grupo</th><th class="p-5">Asignatura</th><th class="p-5 text-center">Acciones</th></tr>
                        </thead>
                        <tbody id="docente_table_body" class="divide-y divide-gray-100"></tbody>
                    </table>
                </div>
            </div>

            <div id="view-estudiante-main" class="tab-content space-y-4">
                <div class="bg-white p-10 rounded-[3rem] shadow-sm border-l-8 border-indigo-600 flex justify-between items-center">
                    <div>
                        <h3 class="font-black text-indigo-900 text-xl uppercase italic">Mis Notas</h3>
                        <p class="text-gray-400 font-bold uppercase text-[10px] mt-2 tracking-widest">Consulta tu rendimiento académico</p>
                    </div>
                    <button onclick="abrirSelectorUniversal(null)" class="bg-orange-500 text-white px-12 py-4 rounded-2xl font-black text-xs uppercase italic shadow-xl">
                        <i class="fas fa-eye mr-2"></i> Ver Periodos
                    </button>
                </div>
                <div id="boletin_container" class="mt-8 space-y-4"></div>
            </div>
        </div>
    </main>

    <div id="modal_periodos" class="modal">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] shadow-2xl overflow-hidden">
            <div class="p-6 bg-slate-900 text-white flex justify-between items-center">
                <span class="font-black uppercase text-[10px] italic">Seleccionar Periodo</span>
                <button onclick="closeModal('modal_periodos')" class="text-2xl">&times;</button>
            </div>
            <div id="period_list_container" class="p-8 space-y-4"></div>
        </div>
    </div>

    <div id="modal_planilla" class="modal">
        <div class="bg-white w-full h-full rounded-2xl shadow-2xl overflow-hidden flex flex-col">
            <div class="p-4 bg-emerald-700 text-white shadow-lg">
                <div class="flex justify-between items-center mb-2">
                    <div class="flex items-center gap-4">
                        <button onclick="closeModal('modal_planilla')" class="bg-white/20 p-2 rounded-lg hover:bg-white/40 transition"><i class="fas fa-arrow-left"></i></button>
                        <span id="planilla_header_txt" class="font-black uppercase text-xs italic"></span>
                    </div>
                    <div id="timer_display" class="bg-red-500 px-4 py-2 rounded-xl font-black text-[10px] shadow-lg border border-white/20 uppercase"></div>
                </div>
                <div id="period_dates_info" class="text-[9px] font-bold opacity-80 flex gap-6 uppercase"></div>
            </div>
            <div class="overflow-auto flex-1 bg-gray-50">
                <table class="w-full text-[10px] border-collapse bg-white">
                    <thead id="planilla_thead" class="bg-gray-100 sticky top-0 z-10 shadow-sm"></thead>
                    <tbody id="planilla_tbody" class="divide-y divide-gray-100"></tbody>
                </table>
            </div>
            <div class="p-4 bg-gray-50 border-t flex justify-between items-center px-10">
                <span id="lock_msg" class="text-[10px] font-black uppercase italic"></span>
                <button id="save_btn" onclick="saveNotasDB()" class="bg-emerald-600 text-white px-12 py-3 rounded-2xl font-black uppercase text-[10px] shadow-xl hover:bg-emerald-700 transition">Sincronizar Datos</button>
            </div>
        </div>
    </div>

    <script>
        // --- DATA SYSTEM ---
        const sesion = JSON.parse(sessionStorage.getItem('activeUser'));
        if(!sesion) window.location.href = 'index.html';

        let db_users = JSON.parse(localStorage.getItem('db_users')) || { 'admin': { user: 'admin', pass: '123', fullname: 'Administrador', role: 'Administrativo' } };
        let db_mats = JSON.parse(localStorage.getItem('db_mats')) || [];
        let db_notas = JSON.parse(localStorage.getItem('db_notas')) || {};
        let db_conf = JSON.parse(localStorage.getItem('db_conf')) || {
            items: [
                { id: 'acad', name: 'Académico', weight: 65, count: 8, color: '#9333ea' },
                { id: 'eval', name: 'Acumulativa', weight: 15, count: 1, color: '#2563eb' },
                { id: 'pers', name: 'Personal', weight: 10, count: 3, color: '#059669' },
                { id: 'soci', name: 'Social', weight: 10, count: 3, color: '#0891b2' }
            ],
            periodos: { 1: {start:'', end:''}, 2: {start:'', end:''}, 3: {start:'', end:''} },
            rubrica: { bajo: 29, basico: 39, alto: 50 }
        };

        let curMat = null, curPer = null, timerInterval = null, isLocked = false;

        window.onload = () => {
            document.getElementById('navFullName').innerText = sesion.fullname;
            document.getElementById('navRole').innerText = sesion.role;
            document.getElementById('sidebar').className = `w-64 text-white flex flex-col shadow-2xl sidebar-${sesion.role.toLowerCase().replace('administrativo','admin')}`;
            renderMenu();
            loadHome();
        };

        function renderMenu() {
            const nav = document.getElementById('menu-nav');
            let html = `<button onclick="loadHome()" class="w-full text-left p-4 hover:bg-white/10 rounded-2xl font-bold text-[10px] uppercase italic transition"><i class="fas fa-home mr-3 text-orange-500"></i> Inicio</button>`;
            if(sesion.role === 'Administrativo') {
                html += `<button onclick="showView('admin-main')" class="w-full text-left p-4 hover:bg-white/10 rounded-2xl font-bold text-[10px] uppercase italic transition"><i class="fas fa-users mr-3 text-blue-400"></i> Usuarios / Materias</button>
                         <button onclick="showView('admin-config')" class="w-full text-left p-4 hover:bg-white/10 rounded-2xl font-bold text-[10px] uppercase italic transition"><i class="fas fa-cog mr-3 text-indigo-400"></i> Configuración</button>`;
            } else if(sesion.role === 'Docente') {
                html += `<button onclick="showView('docente-mats')" class="w-full text-left p-4 hover:bg-white/10 rounded-2xl font-bold text-[10px] uppercase italic transition"><i class="fas fa-book mr-3 text-emerald-400"></i> Mis Asignaturas</button>`;
            } else {
                html += `<button onclick="showView('estudiante-main')" class="w-full text-left p-4 hover:bg-white/10 rounded-2xl font-bold text-[10px] uppercase italic transition"><i class="fas fa-star mr-3 text-indigo-400"></i> Ver Notas</button>`;
            }
            nav.innerHTML = html;
        }

        function showView(v) {
            document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
            document.getElementById(`view-${v}`).classList.add('active');
            if(v === 'admin-main') loadAdmin();
            if(v === 'admin-config') loadConfig();
            if(v === 'docente-mats') loadDocente();
            document.getElementById('view-title').innerText = v.replace('view-','').toUpperCase();
        }

        function loadHome() {
            if(sesion.role === 'Administrativo') showView('admin-main');
            else if(sesion.role === 'Docente') showView('docente-mats');
            else showView('estudiante-main');
        }

        function getNotaColor(val) {
            const v = parseFloat(val); if(!v) return "";
            if(v <= db_conf.rubrica.bajo) return "nota-red";
            if(v <= db_conf.rubrica.basico) return "nota-orange";
            return "nota-green";
        }

        // --- ADMIN ---
        function loadAdmin() {
            document.getElementById('list_users').innerHTML = Object.values(db_users).map(u => `
                <div class="flex justify-between p-3 border-b border-gray-100 items-center"><div><b>${u.fullname}</b><p class="text-[9px] uppercase text-gray-400">${u.role} | @${u.user}</p></div>
                <button onclick="deleteUser('${u.user}')" class="text-red-300 hover:text-red-600"><i class="fas fa-trash"></i></button></div>`).join('');
            document.getElementById('list_mats').innerHTML = db_mats.map(m => `
                <div class="flex justify-between p-3 border-b border-gray-100 items-center"><div><b>${m.nombre}</b><p class="text-[9px] uppercase text-blue-400">Docente: ${db_users[m.docente]?.fullname || 'Sin asignar'}</p></div>
                <div class="flex gap-2">
                    <button onclick="abrirSelectorUniversal(${m.id})" class="bg-blue-600 text-white px-3 py-1 rounded-lg text-[8px] font-black uppercase italic">Notas</button>
                    <button onclick="deleteMat(${m.id})" class="text-red-300 hover:text-red-600"><i class="fas fa-trash"></i></button>
                </div></div>`).join('');
            document.getElementById('sel_dest_mat').innerHTML = db_mats.map(m => `<option value="${m.id}">${m.nombre}</option>`).join('');
            document.getElementById('sel_dest_user').innerHTML = Object.values(db_users).map(u => `<option value="${u.user}">${u.fullname} (${u.role})</option>`).join('');
        }

        function saveUser() {
            const u = document.getElementById('adm_u_user').value.trim(); const p = document.getElementById('adm_u_pass').value.trim();
            const n = document.getElementById('adm_u_name').value.trim(); const r = document.getElementById('adm_u_role').value;
            if(!u || !p || !n) return alert("Faltan datos");
            db_users[u] = { user:u, pass:p, fullname:n, role:r }; localStorage.setItem('db_users', JSON.stringify(db_users));
            alert("Usuario guardado"); loadAdmin();
        }

        function deleteUser(u) { if(u!=='admin' && confirm("¿Borrar?")){ delete db_users[u]; localStorage.setItem('db_users', JSON.stringify(db_users)); loadAdmin(); } }
        function saveMateria() { const n = document.getElementById('adm_m_name').value; if(n){ db_mats.push({id:Date.now(), nombre:n, alumnos:[], docente:null, grupo:'01-A', item_counts:{}, item_names:{}}); localStorage.setItem('db_mats', JSON.stringify(db_mats)); loadAdmin(); } }
        function deleteMat(id) { if(confirm("¿Borrar?")){ db_mats = db_mats.filter(m=>m.id!=id); localStorage.setItem('db_mats', JSON.stringify(db_mats)); loadAdmin(); } }
        
        function matricularAction() {
            const m = db_mats.find(x => x.id == document.getElementById('sel_dest_mat').value);
            const uId = document.getElementById('sel_dest_user').value;
            const u = db_users[uId];
            if(u.role === 'Docente') m.docente = uId; 
            else if(u.role === 'Estudiante' && !m.alumnos.includes(uId)) m.alumnos.push(uId);
            localStorage.setItem('db_mats', JSON.stringify(db_mats)); alert("Vinculación exitosa"); loadAdmin();
        }

        // --- CONFIG ---
        function loadConfig() {
            document.getElementById('rub_bajo_input').value = db_conf.rubrica.bajo;
            document.getElementById('rub_basico_input').value = db_conf.rubrica.basico;
            document.getElementById('rub_alto_input').value = db_conf.rubrica.alto;

            document.getElementById('config_items_container').innerHTML = db_conf.items.map((it, i) => `
                <div class="bg-gray-50 p-4 rounded-2xl border-2 border-dashed item-eval-row">
                    <input type="text" class="it-name w-full font-black text-xs uppercase bg-transparent border-b mb-3" value="${it.name}">
                    <div class="grid grid-cols-2 gap-2 text-[9px] font-bold">
                        <span>PESO %</span><input type="number" class="it-weight w-full border rounded px-1" value="${it.weight}">
                        <span>NOTAS</span><input type="number" class="it-count w-full border rounded px-1" value="${it.count}">
                    </div>
                </div>`).join('');
            
            document.getElementById('config_periods_container').innerHTML = [1,2,3].map(p => `
                <div class="bg-white p-5 rounded-3xl border shadow-sm period-config-row" data-p="${p}">
                    <h4 class="font-black text-[10px] uppercase text-indigo-500 mb-2 italic">Periodo ${p}</h4>
                    <label class="text-[7px] font-black uppercase">Inicio</label>
                    <input type="datetime-local" class="p-start w-full text-[9px] p-2 border rounded-xl mb-3" value="${db_conf.periodos[p].start || ''}">
                    <label class="text-[7px] font-black uppercase">Cierre</label>
                    <input type="datetime-local" class="p-end w-full text-[9px] p-2 border rounded-xl" value="${db_conf.periodos[p].end || ''}">
                </div>`).join('');
        }

        function saveGlobalConfig() {
            db_conf.rubrica.bajo = parseInt(document.getElementById('rub_bajo_input').value);
            db_conf.rubrica.basico = parseInt(document.getElementById('rub_basico_input').value);
            db_conf.rubrica.alto = parseInt(document.getElementById('rub_alto_input').value);

            document.querySelectorAll('.item-eval-row').forEach((row, i) => {
                db_conf.items[i].name = row.querySelector('.it-name').value;
                db_conf.items[i].weight = parseFloat(row.querySelector('.it-weight').value);
                db_conf.items[i].count = parseInt(row.querySelector('.it-count').value);
            });

            document.querySelectorAll('.period-config-row').forEach(row => {
                const p = row.dataset.p;
                db_conf.periodos[p].start = row.querySelector('.p-start').value;
                db_conf.periodos[p].end = row.querySelector('.p-end').value;
            });

            localStorage.setItem('db_conf', JSON.stringify(db_conf)); 
            alert("Configuración Sincronizada"); location.reload();
        }

        // --- PLANILLA DINÁMICA ---
        function changeColumnCount(itId, delta) {
            if(sesion.role !== 'Administrativo') return; // Solo Admin puede
            if(!curMat.item_counts) curMat.item_counts = {};
            const baseCount = db_conf.items.find(x => x.id === itId).count;
            const current = curMat.item_counts[`${curPer}_${itId}`] ?? baseCount;
            const nuevo = Math.max(1, current + delta);
            curMat.item_counts[`${curPer}_${itId}`] = nuevo;
            localStorage.setItem('db_mats', JSON.stringify(db_mats));
            abrirPlanilla(curPer);
        }

        function getNotaCount(itId) {
            if(!curMat.item_counts) return db_conf.items.find(x => x.id === itId).count;
            return curMat.item_counts[`${curPer}_${itId}`] ?? db_conf.items.find(x => x.id === itId).count;
        }

        function getCustomItemName(itId) {
            if(!curMat.item_names) return db_conf.items.find(x => x.id === itId).name;
            return curMat.item_names[`${curPer}_${itId}`] ?? db_conf.items.find(x => x.id === itId).name;
        }

        function abrirSelectorUniversal(mid = null) {
            if(mid) curMat = db_mats.find(m => m.id == mid);
            openModal('modal_periodos');
            document.getElementById('period_list_container').innerHTML = [1,2,3].map(p => `
                <div onclick="${sesion.role === 'Estudiante' ? `renderBoletinVertical(${p})` : `abrirPlanilla(${p})`}" class="bg-gray-50 border-2 p-5 rounded-3xl flex justify-between items-center cursor-pointer hover:border-orange-500 transition group shadow-sm">
                    <span class="font-black text-xs uppercase text-gray-400 group-hover:text-orange-600">Periodo Académico ${p}</span>
                    <i class="fas fa-chevron-right text-gray-300 group-hover:text-orange-600"></i>
                </div>`).join('');
        }

        function loadDocente() {
            const mis = db_mats.filter(m => m.docente === sesion.user);
            document.getElementById('docente_table_body').innerHTML = mis.map(m => `
                <tr class="hover:bg-blue-50 transition">
                    <td class="p-5 font-black text-gray-500">01-A</td>
                    <td class="p-5 font-black uppercase text-emerald-700">${m.nombre}</td>
                    <td class="p-5 text-center"><button onclick="abrirSelectorUniversal(${m.id})" class="bg-emerald-500 text-white px-8 py-2 rounded-xl font-black text-[10px] uppercase shadow-sm">Planilla</button></td>
                </tr>`).join('');
        }

        function abrirPlanilla(p) {
            curPer = p; closeModal('modal_periodos'); openModal('modal_planilla');
            
            const isAdmin = sesion.role === 'Administrativo';
            if(isAdmin) {
                isLocked = false;
                document.getElementById('lock_msg').innerText = "GESTIÓN DE ADMINISTRADOR: SIN RESTRICCIONES";
                document.getElementById('lock_msg').className = "text-blue-600 font-black uppercase italic";
                document.getElementById('save_btn').style.display = 'block';
            } else {
                checkLock(db_conf.periodos[p].start, db_conf.periodos[p].end);
            }

            document.getElementById('planilla_header_txt').innerText = `${curMat.nombre} | P${p}`;
            document.getElementById('period_dates_info').innerHTML = `<span><i class="fas fa-calendar mr-1"></i> Inicio: ${db_conf.periodos[p].start || 'S/D'}</span> <span><i class="fas fa-clock mr-1"></i> Cierre: ${db_conf.periodos[p].end || 'S/D'}</span>`;
            
            let h1 = `<tr class="bg-slate-800 text-white text-[9px] uppercase"><th rowspan="2" class="p-3 border border-white/10 text-left">Estudiante</th>`;
            let h2 = `<tr class="bg-gray-100 text-[8px] font-black uppercase text-gray-500">`;
            
            db_conf.items.forEach(it => {
                const count = getNotaCount(it.id);
                const customName = getCustomItemName(it.id);
                
                // Si es admin, mostramos input para nombre y botones de +/-
                const adminControls = isAdmin ? `
                    <div class="absolute right-1 top-1 flex gap-1">
                        <button onclick="changeColumnCount('${it.id}', 1)" class="bg-white/20 hover:bg-white/40 w-4 h-4 rounded flex items-center justify-center">+</button>
                        <button onclick="changeColumnCount('${it.id}', -1)" class="bg-white/20 hover:bg-white/40 w-4 h-4 rounded flex items-center justify-center">-</button>
                    </div>` : '';

                const headerContent = isAdmin ? 
                    `<input type="text" class="input-item-name it-custom-name" data-itid="${it.id}" value="${customName}">` : 
                    `<span>${customName}</span>`;

                h1 += `<th colspan="${count * 2}" class="border border-white/10 p-1 relative" style="background:${it.color}">
                        ${headerContent}
                        ${adminControls}
                       </th>`;
                for(let i=1; i<=count; i++) h2 += `<th class="border p-1">N${i}</th><th class="border p-1 bg-gray-50">Desc</th>`;
            });
            h1 += `<th rowspan="2" class="bg-orange-500 border border-white/10 px-3 text-center">DEF</th></tr>`;
            document.getElementById('planilla_thead').innerHTML = h1 + h2 + `</tr>`;

            document.getElementById('planilla_tbody').innerHTML = curMat.alumnos.map(uid => {
                const est = db_users[uid] || {fullname: uid}; const key = `${curMat.id}_${curPer}_${uid}`; const n = db_notas[key] || {};
                let cells = "";
                db_conf.items.forEach(it => {
                    const count = getNotaCount(it.id);
                    for(let i=0; i<count; i++) {
                        const val = n[it.id+'_'+i] || ''; const d = n[it.id+'_'+i+'_desc'] || '';
                        cells += `<td class="border p-1"><input type="number" step="1" class="input-nota ${getNotaColor(val)}" data-uid="${uid}" data-it="${it.id}" data-idx="${i}" value="${val}" ${isLocked?'disabled':''}></td>
                                  <td class="border p-1 bg-gray-50"><input type="text" placeholder="..." class="input-desc" data-uid="${uid}" data-it="${it.id}" data-idx="${i}" data-type="desc" value="${d}" ${isLocked?'disabled':''}></td>`;
                    }
                });
                return `<tr><td class="p-3 font-bold border uppercase bg-white">${est.fullname}</td>${cells}<td class="font-black text-center border text-sm" id="def_${uid}">--</td></tr>`;
            }).join('');
            calc();
        }

        // --- ESTUDIANTE ---
        function renderBoletinVertical(p) {
            curPer = p; closeModal('modal_periodos');
            const mis = db_mats.filter(m => m.alumnos.includes(sesion.user));
            const cont = document.getElementById('boletin_container');
            if(mis.length === 0) return cont.innerHTML = "<p class='text-center py-20 font-black opacity-20 uppercase'>Sin materias asignadas</p>";
            
            cont.innerHTML = mis.map(m => {
                const key = `${m.id}_${p}_${sesion.user}`; const n = db_notas[key] || {};
                let det = "", defFinal = 0;
                db_conf.items.forEach(it => {
                    let s = 0, rowList = "";
                    const count = m.item_counts ? (m.item_counts[`${p}_${it.id}`] ?? it.count) : it.count;
                    const customName = m.item_names ? (m.item_names[`${p}_${it.id}`] ?? it.name) : it.name;
                    for(let i=0; i<count; i++) {
                        const v = parseFloat(n[it.id+'_'+i] || 0); const d = n[it.id+'_'+i+'_desc'] || 'Sin descripción.';
                        s += v;
                        rowList += `<div class="flex gap-4 p-4 bg-white border-b last:border-0 items-center">
                                    <div class="w-14 h-14 bg-gray-50 border-2 rounded-2xl flex flex-col items-center justify-center font-black">
                                        <span class="text-[7px] text-gray-400">NOTA ${i+1}</span><span class="text-xl ${getNotaColor(v)}">${v || '--'}</span>
                                    </div>
                                    <div class="flex-1"><p class="text-[9px] font-black uppercase tracking-widest" style="color:${it.color}">${customName}</p><p class="text-xs text-gray-500 italic mt-1">"${d}"</p></div>
                                 </div>`;
                    }
                    const prom = count > 0 ? (s/count) : 0; defFinal += prom * (it.weight/100);
                    det += `<div class="mb-4 bg-gray-50 rounded-2xl border overflow-hidden">
                                <div class="p-3 text-white font-black text-[10px] uppercase" style="background:${it.color}">${customName} (${it.weight}%)</div>
                                ${rowList}
                            </div>`;
                });
                return `<div class="bg-white rounded-[2.5rem] shadow-sm border overflow-hidden">
                    <div class="p-6 flex justify-between items-center cursor-pointer hover:bg-gray-50 transition" onclick="document.getElementById('det_${m.id}').classList.toggle('open')">
                        <div class="flex items-center gap-4"><div class="w-12 h-12 bg-indigo-50 rounded-2xl flex items-center justify-center text-xl shadow-inner"><i class="fas fa-book"></i></div>
                        <div><h4 class="font-black text-gray-700 uppercase italic text-xs">${m.nombre}</h4><p class="text-[9px] text-gray-400 font-bold uppercase tracking-widest">Periodo ${p}</p></div></div>
                        <div class="text-right"><span class="block text-[8px] font-black text-gray-300 uppercase">Definitiva</span><span class="text-3xl font-black ${getNotaColor(defFinal)}">${defFinal.toFixed(1)}</span></div>
                    </div>
                    <div id="det_${m.id}" class="accordion-content bg-white p-4">${det}</div>
                </div>`;
            }).join('');
        }

        // --- CORE LOGIC ---
        function checkLock(start, end) {
            const disp = document.getElementById('timer_display'); const btn = document.getElementById('save_btn'); const lmsg = document.getElementById('lock_msg');
            if(timerInterval) clearInterval(timerInterval);
            const now = new Date().getTime(); const sDate = new Date(start).getTime(); const eDate = new Date(end).getTime();
            if(!start || !end) { isLocked = true; disp.innerHTML = "BLOQUEADO: SIN FECHAS"; btn.style.display = 'none'; return; }
            const up = () => {
                const cur = new Date().getTime();
                if(cur < sDate) { isLocked = true; disp.innerHTML = "BLOQUEADO: NO INICIADO"; btn.style.display = 'none'; lmsg.innerText = "ACCESO BLOQUEADO HASTA INICIO"; lmsg.className="text-orange-500 font-black italic tracking-widest uppercase"; }
                else if(cur > eDate) { isLocked = true; disp.innerHTML = "SISTEMA CERRADO"; btn.style.display = 'none'; lmsg.innerText = "SOLO LECTURA - PERIODO FINALIZADO"; lmsg.className="text-red-500 font-black italic tracking-widest uppercase"; clearInterval(timerInterval); }
                else { isLocked = false; btn.style.display = 'block'; lmsg.innerText = "SISTEMA HABILITADO PARA CALIFICAR"; lmsg.className="text-emerald-500 font-black italic tracking-widest uppercase";
                    const diff = eDate - cur; const d = Math.floor(diff/(1000*60*60*24)), h = Math.floor((diff%(1000*60*60*24))/(1000*60*60)), m = Math.floor((diff%(1000*60*60))/(1000*60)), s = Math.floor((diff%(1000*60))/1000);
                    disp.innerHTML = `CIERRE EN: ${d}d ${h}h ${m}m ${s}s`;
                }
            };
            up(); timerInterval = setInterval(up, 1000);
        }

        function saveNotasDB() {
            // Guardar Nombres Personalizados (Solo Admin)
            if(sesion.role === 'Administrativo') {
                if(!curMat.item_names) curMat.item_names = {};
                document.querySelectorAll('.it-custom-name').forEach(inp => {
                    const itId = inp.dataset.itid;
                    curMat.item_names[`${curPer}_${itId}`] = inp.value;
                });
                localStorage.setItem('db_mats', JSON.stringify(db_mats));
            }

            // Guardar Notas
            document.querySelectorAll('.input-nota').forEach(inp => {
                const {uid, it, idx} = inp.dataset; const key = `${curMat.id}_${curPer}_${uid}`;
                if(!db_notas[key]) db_notas[key] = {};
                db_notas[key][`${it}_${idx}`] = inp.value;
                const dInp = document.querySelector(`.input-desc[data-uid="${uid}"][data-it="${it}"][data-idx="${idx}"]`);
                db_notas[key][`${it}_${idx}_desc`] = dInp ? dInp.value : '';
            });
            localStorage.setItem('db_notas', JSON.stringify(db_notas)); alert("Datos Sincronizados"); calc();
        }

        function calc() {
            const alums = sesion.role === 'Estudiante' ? [sesion.user] : curMat.alumnos;
            alums.forEach(uid => {
                let f = 0;
                db_conf.items.forEach(it => {
                    let s = 0;
                    const count = getNotaCount(it.id);
                    for(let i=0; i<count; i++) s += parseFloat(document.querySelector(`.input-nota[data-uid="${uid}"][data-it="${it.id}"][data-idx="${i}"]`)?.value || 0);
                    f += (count > 0 ? (s/count) : 0) * (it.weight/100);
                });
                const el = document.getElementById(`def_${uid}`); if(el){ el.innerText = f.toFixed(1); el.className = `font-black text-center border text-sm ${getNotaColor(f)}`; }
            });
        }

        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); if(timerInterval) clearInterval(timerInterval); }
        function logout() { sessionStorage.clear(); window.location.href = 'index.html'; }
    </script>
</body>
</html>
