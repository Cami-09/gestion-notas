<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Integra Pro v3.2 | Sistema Blindado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .sidebar-admin { background: #1e3a8a; }
        .sidebar-docente { background: #065f46; }
        .sidebar-estudiante { background: #3730a3; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .badge-bajo { background: #fee2e2; color: #991b1b; }
        .badge-basico { background: #fef3c7; color: #92400e; }
        .badge-alto { background: #dcfce7; color: #166534; }
        .badge-superior { background: #e0e7ff; color: #3730a3; }
    </style>
</head>
<body class="bg-gray-100 flex h-screen overflow-hidden text-sm">

    <aside id="sidebar" class="w-64 text-white flex flex-col shadow-2xl">
        <div class="p-6 border-b border-white/10 text-center">
            <h1 class="text-2xl font-black italic">INTEGRA<span class="text-orange-500 text-sm">PRO</span></h1>
        </div>
        <nav class="mt-6 flex-1 px-4 space-y-2" id="menuOptions"></nav>
        <div class="p-4 bg-black/20 text-center text-[10px] font-bold">CONECTADO</div>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="bg-white p-4 shadow-md flex justify-between items-center px-8 border-b-4 border-orange-500">
            <div>
                <h2 id="viewTitle" class="text-xl font-black text-gray-800 uppercase italic">Panel de Control</h2>
                <p class="text-[10px] text-gray-400 mt-1 font-bold uppercase tracking-widest" id="currentPeriodLabel">Cargando cronograma...</p>
            </div>
            <div class="flex items-center gap-4 text-right">
                <div>
                    <p id="navFullName" class="font-bold text-gray-900 leading-none text-base">---</p>
                    <p id="navRole" class="text-[10px] uppercase text-orange-600 font-black mt-1">---</p>
                </div>
                <button onclick="logout()" class="w-10 h-10 bg-red-50 text-red-600 rounded-full flex items-center justify-center hover:bg-red-600 hover:text-white transition">
                    <i class="fas fa-power-off"></i>
                </button>
            </div>
        </header>

        <div class="p-6 overflow-y-auto h-full pb-32">
            
            <div id="view-admin" class="tab-content">
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
                    <div class="bg-white p-6 rounded-3xl shadow-sm border-t-4 border-purple-600">
                        <h3 class="font-black text-purple-700 uppercase text-xs mb-4">Escala Valorativa</h3>
                        <div class="space-y-2">
                            <div class="flex justify-between"><span class="text-[10px] font-bold">BAJO:</span><input type="number" step="0.1" id="esc_bajo" class="w-16 border rounded text-center font-bold"></div>
                            <div class="flex justify-between"><span class="text-[10px] font-bold">BÁSICO:</span><input type="number" step="0.1" id="esc_basico" class="w-16 border rounded text-center font-bold"></div>
                            <div class="flex justify-between"><span class="text-[10px] font-bold">ALTO:</span><input type="number" step="0.1" id="esc_alto" class="w-16 border rounded text-center font-bold"></div>
                            <div class="flex justify-between"><span class="text-[10px] font-bold">SUPERIOR:</span><input type="number" step="0.1" id="esc_superior" class="w-16 border rounded text-center font-bold"></div>
                        </div>
                        <button onclick="saveEscala()" class="w-full mt-4 bg-purple-600 text-white py-2 rounded-xl font-bold text-[10px]">GUARDAR ESCALA</button>
                    </div>
                    <div class="bg-white p-6 rounded-3xl shadow-sm border-t-4 border-blue-900">
                        <h3 class="font-black text-blue-900 uppercase text-xs mb-4">Cronograma</h3>
                        <select id="admin_p_select" class="w-full mb-2 p-2 border rounded-xl text-xs font-bold bg-gray-50">
                            <option value="1">Periodo 1</option><option value="2">Periodo 2</option><option value="3">Periodo 3</option>
                        </select>
                        <input type="datetime-local" id="f_inicio" class="w-full mb-1 p-2 border rounded-lg text-xs">
                        <input type="datetime-local" id="f_cierre" class="w-full mb-2 p-2 border rounded-lg text-xs">
                        <button onclick="saveCronograma()" class="w-full bg-blue-900 text-white py-2 rounded-xl font-bold text-[10px]">ACTUALIZAR FECHAS</button>
                    </div>
                    <div class="bg-white p-6 rounded-3xl shadow-sm border-t-4 border-gray-800">
                        <h3 class="font-black text-gray-800 uppercase text-xs mb-4">Registrar</h3>
                        <input type="text" id="reg_name" placeholder="Nombre" class="w-full mb-1 p-2 border rounded-xl text-xs">
                        <div class="flex gap-2">
                            <input type="text" id="reg_user" placeholder="ID" class="w-1/2 p-2 border rounded-xl text-xs">
                            <input type="text" id="reg_pass" placeholder="Clave" class="w-1/2 p-2 border rounded-xl text-xs">
                        </div>
                        <select id="reg_role" class="w-full my-2 p-2 border rounded-xl text-xs font-bold">
                            <option value="Estudiante">Estudiante</option><option value="Docente">Docente</option><option value="Administrativo">Administrativo</option>
                        </select>
                        <button onclick="register()" class="w-full bg-black text-white py-2 rounded-xl font-bold text-[10px]">CREAR CUENTA</button>
                    </div>
                </div>
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <div class="bg-white p-6 rounded-3xl border-t-4 border-orange-500">
                        <h3 class="font-black uppercase text-xs mb-4 text-orange-600 italic">Asignación y Matrícula</h3>
                        <div class="flex gap-2 mb-2">
                            <input type="text" id="mat_name" placeholder="Materia" class="flex-1 p-2 border rounded-xl text-xs">
                            <select id="sel_doc" class="flex-1 p-2 border rounded-xl text-xs"></select>
                            <button onclick="addMateria()" class="bg-orange-600 text-white px-4 rounded-xl font-bold text-[10px]">ASIGNAR</button>
                        </div>
                        <div class="p-3 bg-green-50 rounded-2xl flex gap-2">
                            <select id="sel_est" class="flex-1 p-2 border rounded-xl text-xs"></select>
                            <select id="sel_mat" class="flex-1 p-2 border rounded-xl text-xs"></select>
                            <button onclick="matricular()" class="bg-green-600 text-white px-4 rounded-xl font-bold text-[10px]">VINCULAR</button>
                        </div>
                    </div>
                    <div class="bg-white rounded-3xl border overflow-hidden">
                        <div class="p-3 bg-gray-50 border-b font-black text-gray-400 text-[10px] uppercase">Registros</div>
                        <div class="max-h-40 overflow-y-auto"><table class="w-full text-left"><tbody id="table_users" class="divide-y"></tbody></table></div>
                    </div>
                </div>
            </div>

            <div id="view-docente" class="tab-content"><div id="doc_grid" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div></div>
            <div id="view-estudiante" class="tab-content"><div id="est_boletin" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div></div>
        </div>
    </main>

    <div id="modal_planilla" class="modal">
        <div class="bg-white w-full max-w-5xl mx-4 rounded-[2.5rem] shadow-2xl overflow-hidden flex flex-col">
            <div class="p-6 bg-gray-900 text-white flex justify-between items-center"><h3 id="modal_mat_name" class="font-black uppercase italic">PLANILLA</h3><button onclick="closePlanilla()" class="text-3xl">&times;</button></div>
            <div class="flex bg-gray-100 border-b">
                <button onclick="setPeriodo(1)" id="p1_btn" class="flex-1 py-4 font-black text-xs uppercase">Periodo 1</button>
                <button onclick="setPeriodo(2)" id="p2_btn" class="flex-1 py-4 font-black text-xs uppercase border-x">Periodo 2</button>
                <button onclick="setPeriodo(3)" id="p3_btn" class="flex-1 py-4 font-black text-xs uppercase">Periodo 3</button>
            </div>
            <div class="p-8 overflow-y-auto max-h-[60vh]"><div id="status_msg" class="mb-4 p-3 rounded-2xl text-[10px] font-black text-center uppercase"></div><table class="w-full text-left border-collapse"><thead><tr class="text-[10px] text-gray-400 uppercase border-b"><th class="pb-3">Estudiante</th><th class="pb-3 text-center">N1</th><th class="pb-3 text-center">N2</th><th class="pb-3 text-center">EX</th><th class="pb-3 text-center">DEF</th><th class="pb-3 text-center">RANGO</th></tr></thead><tbody id="planilla_rows" class="divide-y"></tbody></table></div>
            <div class="p-4 bg-gray-50 text-right"><button onclick="closePlanilla()" class="bg-gray-800 text-white px-8 py-2 rounded-2xl font-black text-[10px] uppercase">Cerrar</button></div>
        </div>
    </div>

    <script>
        // SEGURIDAD DE INICIO
        const sesion = JSON.parse(sessionStorage.getItem('activeUser')) || null;
        if(!sesion) window.location.href = 'index.html';

        let curMatId = null, curPer = 1;

        // INICIO SEGURO
        window.addEventListener('DOMContentLoaded', () => {
            try {
                cargarInterfazBase();
                validarCronograma();
                ejecutarCargaPorRol();
                console.log("Sistema Integra Pro iniciado con éxito.");
            } catch (error) {
                console.error("Error crítico de inicio:", error);
                document.getElementById('currentPeriodLabel').innerText = "ERROR DE CARGA: LIMPIA CACHÉ";
            }
        });

        function cargarInterfazBase() {
            document.getElementById('navFullName').innerText = sesion.fullname || sesion.user;
            document.getElementById('navRole').innerText = sesion.role;
            const menu = document.getElementById('menuOptions');
            const side = document.getElementById('sidebar');
            
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            const view = document.getElementById('view-' + sesion.role.toLowerCase());
            if(view) view.classList.add('active');

            side.className = `w-64 text-white flex flex-col shadow-2xl sidebar-${sesion.role.toLowerCase()}`;
            menu.innerHTML = `<button class="w-full text-left p-3 bg-white/10 rounded-xl font-black text-[10px] uppercase"><i class="fas fa-th-large mr-3"></i> Dashboard Principal</button>`;
        }

        function getEscala() {
            const def = { bajo: 2.9, basico: 3.9, alto: 4.5, superior: 5.0 };
            try {
                const saved = JSON.parse(localStorage.getItem('db_escala'));
                return saved || def;
            } catch(e) { return def; }
        }

        function getCategoria(n) {
            const e = getEscala();
            if(n <= e.bajo) return { label: 'BAJO', class: 'badge-bajo' };
            if(n <= e.basico) return { label: 'BÁSICO', class: 'badge-basico' };
            if(n <= e.alto) return { label: 'ALTO', class: 'badge-alto' };
            return { label: 'SUPERIOR', class: 'badge-superior' };
        }

        function ejecutarCargaPorRol() {
            if(sesion.role === 'Administrativo') loadAdmin();
            if(sesion.role === 'Docente') loadDocente();
            if(sesion.role === 'Estudiante') loadEstudiante();
        }

        // ADMIN
        function loadAdmin() {
            const esc = getEscala();
            if(document.getElementById('esc_bajo')){
                document.getElementById('esc_bajo').value = esc.bajo;
                document.getElementById('esc_basico').value = esc.basico;
                document.getElementById('esc_alto').value = esc.alto;
                document.getElementById('esc_superior').value = esc.superior;
            }

            const users = [];
            for(let i=0; i<localStorage.length; i++) {
                let k = localStorage.key(i);
                if(['db_materias','db_notas','activeUser','cronograma','db_escala'].includes(k)) continue;
                try {
                    let d = JSON.parse(localStorage.getItem(k));
                    if(d && d.user) users.push(d);
                } catch(e){}
            }

            document.getElementById('table_users').innerHTML = users.map(u => `
                <tr class="text-[10px] hover:bg-gray-50 border-b">
                    <td class="p-2 font-bold">${u.fullname || u.user}</td>
                    <td class="p-2 uppercase font-black text-blue-800">${u.role[0]}</td>
                    <td class="p-2 text-right"><button onclick="deleteUser('${u.user}')" class="text-red-300"><i class="fas fa-times"></i></button></td>
                </tr>`).join('');

            const docs = users.filter(u => u.role === 'Docente');
            const ests = users.filter(u => u.role === 'Estudiante');
            document.getElementById('sel_doc').innerHTML = docs.map(d => `<option value="${d.user}">${d.fullname || d.user}</option>`).join('');
            document.getElementById('sel_est').innerHTML = ests.map(e => `<option value="${e.user}">${e.fullname || e.user}</option>`).join('');
            
            const mats = JSON.parse(localStorage.getItem('db_materias')) || [];
            document.getElementById('sel_mat').innerHTML = mats.map(m => `<option value="${m.id}">${m.nombre}</option>`).join('');
        }

        function saveEscala() {
            const esc = {
                bajo: parseFloat(document.getElementById('esc_bajo').value) || 2.9,
                basico: parseFloat(document.getElementById('esc_basico').value) || 3.9,
                alto: parseFloat(document.getElementById('esc_alto').value) || 4.5,
                superior: parseFloat(document.getElementById('esc_superior').value) || 5.0
            };
            localStorage.setItem('db_escala', JSON.stringify(esc));
            alert("Escala actualizada.");
        }

        function saveCronograma() {
            const p = document.getElementById('admin_p_select').value;
            const i = document.getElementById('f_inicio').value;
            const c = document.getElementById('f_cierre').value;
            if(!i || !c) return alert("Fechas incompletas.");
            let cro = JSON.parse(localStorage.getItem('cronograma')) || {};
            cro[p] = { inicio: i, cierre: c };
            localStorage.setItem('cronograma', JSON.stringify(cro));
            alert("Periodo actualizado.");
            validarCronograma();
        }

        function validarCronograma() {
            const cro = JSON.parse(localStorage.getItem('cronograma')) || {};
            const label = document.getElementById('currentPeriodLabel');
            const ahora = new Date();
            let act = "SISTEMA CERRADO";
            for(let p in cro) {
                if(ahora >= new Date(cro[p].inicio) && ahora <= new Date(cro[p].cierre)) act = "SISTEMA ABIERTO: PERIODO " + p;
            }
            label.innerText = act;
        }

        function register() {
            const u = document.getElementById('reg_user').value.trim();
            const p = document.getElementById('reg_pass').value.trim();
            const n = document.getElementById('reg_name').value.trim();
            const r = document.getElementById('reg_role').value;
            if(!u || !p || !n) return alert("Faltan datos.");
            localStorage.setItem(u, JSON.stringify({user:u, pass:p, fullname:n, role:r}));
            loadAdmin();
        }

        function addMateria() {
            const n = document.getElementById('mat_name').value.trim();
            const d = document.getElementById('sel_doc').value;
            if(!n) return;
            let mats = JSON.parse(localStorage.getItem('db_materias')) || [];
            mats.push({id: Date.now(), nombre: n, docente: d, matriculados: []});
            localStorage.setItem('db_materias', JSON.stringify(mats));
            loadAdmin();
        }

        function matricular() {
            const e = document.getElementById('sel_est').value;
            const mId = document.getElementById('sel_mat').value;
            let mats = JSON.parse(localStorage.getItem('db_materias')) || [];
            const idx = mats.findIndex(m => m.id == mId);
            if(idx > -1 && !mats[idx].matriculados.includes(e)) {
                mats[idx].matriculados.push(e);
                localStorage.setItem('db_materias', JSON.stringify(mats));
                alert("Matriculado.");
            }
        }

        // DOCENTE
        function loadDocente() {
            const mats = JSON.parse(localStorage.getItem('db_materias')) || [];
            const mis = mats.filter(m => m.docente === sesion.user);
            const g = document.getElementById('doc_grid');
            if(mis.length === 0) return g.innerHTML = "<p class='col-span-3 text-center py-20 opacity-30 font-bold uppercase'>Sin materias</p>";
            g.innerHTML = mis.map(m => `
                <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border-b-8 border-green-600 hover:shadow-xl transition cursor-pointer" onclick="openPlanilla(${m.id})">
                    <div class="w-12 h-12 bg-green-50 text-green-600 rounded-2xl flex items-center justify-center mb-4"><i class="fas fa-book"></i></div>
                    <h3 class="font-black text-gray-800 uppercase text-xs">${m.nombre}</h3>
                    <p class="text-[9px] font-bold mt-2 text-gray-400">${m.matriculados.length} Estudiantes</p>
                </div>`).join('');
        }

        function openPlanilla(id) {
            curMatId = id;
            const m = (JSON.parse(localStorage.getItem('db_materias')) || []).find(x => x.id == id);
            document.getElementById('modal_mat_name').innerText = m.nombre;
            document.getElementById('modal_planilla').classList.add('active');
            setPeriodo(1);
        }

        function setPeriodo(p) {
            curPer = p;
