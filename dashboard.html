<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Integra Pro v2 | Gestión por Periodos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .sidebar-admin { background: #1e3a8a; }
        .sidebar-docente { background: #065f46; }
        .sidebar-estudiante { background: #3730a3; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .active-p-btn { background: white !important; color: #059669 !important; border-bottom: 4px solid #059669; }
    </style>
</head>
<body class="bg-gray-100 flex h-screen overflow-hidden text-sm">

    <aside id="sidebar" class="w-64 text-white flex flex-col shadow-2xl transition-all">
        <div class="p-6 border-b border-white/10 text-center">
            <h1 class="text-2xl font-black tracking-tighter uppercase italic">INTEGRA<span class="text-orange-500 text-sm">PRO</span></h1>
        </div>
        <nav class="mt-6 flex-1 px-4 space-y-2" id="menuOptions"></nav>
        <div class="p-4 bg-black/20 text-center uppercase text-[10px] font-bold tracking-widest opacity-60">Sistema v2026</div>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="bg-white p-4 shadow-md flex justify-between items-center px-8 border-b-4 border-orange-500">
            <div>
                <h2 id="viewTitle" class="text-xl font-black text-gray-800 uppercase leading-none">Panel de Control</h2>
                <p class="text-[10px] text-gray-400 mt-1 font-bold uppercase" id="currentPeriodLabel">Verificando periodos...</p>
            </div>
            <div class="flex items-center gap-4 text-right">
                <div>
                    <p id="navFullName" class="font-bold text-gray-900 leading-none text-base"></p>
                    <p id="navRole" class="text-[10px] uppercase text-orange-600 font-black mt-1"></p>
                </div>
                <button onclick="logout()" class="w-10 h-10 bg-red-100 text-red-600 rounded-full flex items-center justify-center hover:bg-red-600 hover:text-white transition shadow-sm">
                    <i class="fas fa-power-off"></i>
                </button>
            </div>
        </header>

        <div class="p-6 overflow-y-auto h-full pb-24">
            
            <div id="view-admin" class="tab-content">
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
                    <div class="bg-white p-6 rounded-2xl shadow-sm border-t-4 border-blue-900">
                        <h3 class="font-black text-blue-900 uppercase text-xs mb-4"><i class="fas fa-calendar-alt mr-2"></i>Cargue por Periodos</h3>
                        <select id="admin_p_select" class="w-full mb-3 p-2 border rounded-lg text-xs font-bold">
                            <option value="1">Periodo 1</option>
                            <option value="2">Periodo 2</option>
                            <option value="3">Periodo 3</option>
                        </select>
                        <div class="grid grid-cols-1 gap-2 mb-4">
                            <div>
                                <label class="text-[9px] font-bold text-gray-400">APERTURA</label>
                                <input type="datetime-local" id="f_inicio" class="w-full p-2 border rounded-lg text-xs">
                            </div>
                            <div>
                                <label class="text-[9px] font-bold text-gray-400">CIERRE</label>
                                <input type="datetime-local" id="f_cierre" class="w-full p-2 border rounded-lg text-xs">
                            </div>
                        </div>
                        <button onclick="saveCronograma()" class="w-full bg-blue-900 text-white py-2 rounded-lg font-bold hover:bg-blue-800 transition uppercase text-[10px]">Guardar Plazo</button>
                    </div>

                    <div class="bg-white p-6 rounded-2xl shadow-sm border-t-4 border-blue-900">
                        <h3 class="font-black text-blue-900 uppercase text-xs mb-4"><i class="fas fa-user-plus mr-2"></i>Registrar Usuario</h3>
                        <input type="text" id="reg_name" placeholder="Nombre Completo" class="w-full mb-2 p-2 border rounded-lg text-xs">
                        <div class="flex gap-2 mb-2">
                            <input type="text" id="reg_user" placeholder="ID/Usuario" class="w-1/2 p-2 border rounded-lg text-xs">
                            <input type="text" id="reg_pass" placeholder="Clave" class="w-1/2 p-2 border rounded-lg text-xs">
                        </div>
                        <select id="reg_role" class="w-full mb-4 p-2 border rounded-lg text-xs font-bold text-gray-500">
                            <option value="Estudiante">Estudiante</option>
                            <option value="Docente">Docente</option>
                            <option value="Administrativo">Administrativo</option>
                        </select>
                        <button onclick="register()" class="w-full bg-gray-900 text-white py-2 rounded-lg font-bold hover:bg-black transition uppercase text-[10px]">Crear Cuenta</button>
                    </div>

                    <div class="bg-white p-6 rounded-2xl shadow-sm border-t-4 border-orange-500">
                        <h3 class="font-black text-orange-600 uppercase text-xs mb-4"><i class="fas fa-plus-circle mr-2"></i>Asignatura</h3>
                        <input type="text" id="mat_name" placeholder="Ej: Ciencias Naturales" class="w-full mb-2 p-2 border rounded-lg text-xs">
                        <select id="sel_doc" class="w-full mb-4 p-2 border rounded-lg text-xs"></select>
                        <button onclick="addMateria()" class="w-full bg-orange-600 text-white py-2 rounded-lg font-bold hover:bg-orange-700 transition uppercase text-[10px]">Crear Materia</button>
                    </div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <div class="bg-white rounded-2xl shadow-sm border overflow-hidden">
                        <div class="p-3 bg-gray-50 border-b font-black text-gray-400 text-[10px] uppercase">Base de Datos de Usuarios</div>
                        <div class="max-h-60 overflow-y-auto">
                            <table class="w-full text-left divide-y"><tbody id="table_users"></tbody></table>
                        </div>
                    </div>
                    <div class="bg-white p-6 rounded-2xl shadow-sm border-t-4 border-green-600">
                        <h3 class="font-black text-green-700 uppercase text-xs mb-4">Matriculación Directa</h3>
                        <select id="sel_est" class="w-full mb-2 p-2 border rounded-lg text-xs"></select>
                        <select id="sel_mat" class="w-full mb-4 p-2 border rounded-lg text-xs"></select>
                        <button onclick="matricular()" class="w-full bg-green-600 text-white py-2 rounded-lg font-bold hover:bg-green-700 uppercase text-[10px]">Confirmar Matrícula</button>
                    </div>
                </div>
            </div>

            <div id="view-docente" class="tab-content">
                <div id="doc_grid" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
            </div>

            <div id="view-estudiante" class="tab-content">
                <div id="est_boletin" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
            </div>
        </div>
    </main>

    <div id="modal_planilla" class="modal">
        <div class="bg-white w-full max-w-4xl mx-4 rounded-3xl shadow-2xl overflow-hidden flex flex-col">
            <div class="p-6 bg-gray-800 text-white flex justify-between items-center">
                <div>
                    <h3 id="modal_mat_name" class="font-black uppercase text-sm">MATERIA</h3>
                    <p class="text-[10px] text-gray-400 font-bold uppercase">Planilla de Registro de Calificaciones</p>
                </div>
                <button onclick="closePlanilla()" class="text-3xl">&times;</button>
            </div>
            <div class="flex bg-gray-100 border-b">
                <button onclick="setPeriodo(1)" id="p1_btn" class="flex-1 py-4 font-black text-xs uppercase transition-all">P1</button>
                <button onclick="setPeriodo(2)" id="p2_btn" class="flex-1 py-4 font-black text-xs uppercase transition-all">P2</button>
                <button onclick="setPeriodo(3)" id="p3_btn" class="flex-1 py-4 font-black text-xs uppercase transition-all">P3</button>
            </div>
            <div class="p-6 overflow-y-auto max-h-[60vh]">
                <div id="status_msg" class="mb-4 p-3 rounded-xl text-[10px] font-black text-center uppercase"></div>
                <table class="w-full text-left">
                    <thead>
                        <tr class="text-[10px] text-gray-400 uppercase border-b">
                            <th class="pb-3">Nombre Estudiante</th>
                            <th class="pb-3 text-center w-20">Nota 1 (30%)</th>
                            <th class="pb-3 text-center w-20">Nota 2 (30%)</th>
                            <th class="pb-3 text-center w-20">Examen (40%)</th>
                            <th class="pb-3 text-center w-20">Final</th>
                        </tr>
                    </thead>
                    <tbody id="planilla_rows" class="divide-y"></tbody>
                </table>
            </div>
            <div class="p-4 bg-gray-50 text-right"><button onclick="closePlanilla()" class="bg-gray-800 text-white px-8 py-2 rounded-xl font-black text-[10px] uppercase">Cerrar Planilla</button></div>
        </div>
    </div>

    <script>
        // --- CORE DATA ---
        const sesion = JSON.parse(sessionStorage.getItem('activeUser'));
        if(!sesion) window.location.href = 'index.html';

        let curMatId = null;
        let curPer = 1;

        window.onload = () => {
            updateUI();
            if(sesion.role === 'Administrativo') loadAdmin();
            if(sesion.role === 'Docente') loadDocente();
            if(sesion.role === 'Estudiante') loadEstudiante();
            checkGlobalCronograma();
        };

        function updateUI() {
            document.getElementById('navFullName').innerText = sesion.fullname || sesion.user;
            document.getElementById('navRole').innerText = sesion.role;
            const menu = document.getElementById('menuOptions');
            const side = document.getElementById('sidebar');
            
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById('view-' + sesion.role.toLowerCase()).classList.add('active');
            document.getElementById('viewTitle').innerText = "Panel " + sesion.role;

            let icon = sesion.role === 'Administrativo' ? 'fa-user-shield' : (sesion.role === 'Docente' ? 'fa-pencil-ruler' : 'fa-graduation-cap');
            side.classList.add(sesion.role === 'Administrativo' ? 'sidebar-admin' : (sesion.role === 'Docente' ? 'sidebar-docente' : 'sidebar-estudiante'));
            menu.innerHTML = `<button class="w-full text-left p-3 bg-white/10 rounded-xl font-bold text-[10px] uppercase tracking-widest"><i class="fas ${icon} mr-3"></i> Mi Dashboard</button>`;
        }

        // --- ADMIN ---
        function loadAdmin() {
            const users = [];
            for(let i=0; i<localStorage.length; i++) {
                let k = localStorage.key(i);
                if(['db_materias','db_notas','activeUser','cronograma'].includes(k)) continue;
                users.push(JSON.parse(localStorage.getItem(k)));
            }

            document.getElementById('table_users').innerHTML = users.map(u => `
                <tr class="text-xs hover:bg-gray-50">
                    <td class="p-3 font-bold text-gray-800">${u.fullname} <span class="text-gray-400 font-normal">(@${u.user})</span></td>
                    <td class="p-3 uppercase text-[9px] font-black">${u.role}</td>
                    <td class="p-3 text-right"><button onclick="deleteUser('${u.user}')" class="text-red-400 hover:text-red-600"><i class="fas fa-trash"></i></button></td>
                </tr>`).join('');

            const docs = users.filter(u => u.role === 'Docente');
            const ests = users.filter(u => u.role === 'Estudiante');
            document.getElementById('sel_doc').innerHTML = docs.map(d => `<option value="${d.user}">${d.fullname}</option>`).join('');
            document.getElementById('sel_est').innerHTML = ests.map(e => `<option value="${e.user}">${e.fullname}</option>`).join('');
            
            const mats = JSON.parse(localStorage.getItem('db_materias')) || [];
            document.getElementById('sel_mat').innerHTML = mats.map(m => `<option value="${m.id}">${m.nombre}</option>`).join('');
        }

        function saveCronograma() {
            const p = document.getElementById('admin_p_select').value;
            const i = document.getElementById('f_inicio').value;
            const c = document.getElementById('f_cierre').value;
            if(!i || !c) return alert("Define ambas fechas");

            let crono = JSON.parse(localStorage.getItem('cronograma')) || { 1:null, 2:null, 3:null };
            crono[p] = { inicio: i, cierre: c };
            localStorage.setItem('cronograma', JSON.stringify(crono));
            alert("Cronograma de Periodo " + p + " guardado.");
            checkGlobalCronograma();
        }

        function checkGlobalCronograma() {
            const crono = JSON.parse(localStorage.getItem('cronograma')) || {};
            const label = document.getElementById('currentPeriodLabel');
            const ahora = new Date();
            let activo = "Ningún periodo abierto";

            for(let p=1; p<=3; p++) {
                if(crono[p]) {
                    const ini = new Date(crono[p].inicio);
                    const cie = new Date(crono[p].cierre);
                    if(ahora >= ini && ahora <= cie) activo = "Sistema abierto: Periodo " + p;
                }
            }
            label.innerText = activo;
        }

        function register() {
            const u = document.getElementById('reg_user').value.trim();
            const p = document.getElementById('reg_pass').value.trim();
            const n = document.getElementById('reg_name').value.trim();
            const r = document.getElementById('reg_role').value;
            if(!u || !p || !n) return alert("Completa todos los campos");
            localStorage.setItem(u, JSON.stringify({user:u, pass:p, fullname:n, role:r}));
            loadAdmin();
        }

        function addMateria() {
            const n = document.getElementById('mat_name').value.trim();
            const d = document.getElementById('sel_doc').value;
            if(!n) return;
            let mats = JSON.parse(localStorage.getItem('db_materias')) || [];
            mats.push({id: Date.now(), nombre: n, docente: d, matriculados: []});
            localStorage.setItem('db_materias', JSON.stringify(mats));
            loadAdmin();
        }

        function matricular() {
            const e = document.getElementById('sel_est').value;
            const mId = document.getElementById('sel_mat').value;
            let mats = JSON.parse(localStorage.getItem('db_materias')) || [];
            const idx = mats.findIndex(m => m.id == mId);
            if(idx > -1 && !mats[idx].matriculados.includes(e)) {
                mats[idx].matriculados.push(e);
                localStorage.setItem('db_materias', JSON.stringify(mats));
                alert("Matriculado con éxito");
            }
        }

        // --- DOCENTE ---
        function loadDocente() {
            const mats = JSON.parse(localStorage.getItem('db_materias')) || [];
            const misMats = mats.filter(m => m.docente === sesion.user);
            const grid = document.getElementById('doc_grid');
            if(misMats.length === 0) return grid.innerHTML = "<p class='col-span-3 text-center py-10 opacity-50 font-bold'>No tienes materias asignadas.</p>";

            grid.innerHTML = misMats.map(m => `
                <div class="bg-white p-6 rounded-3xl shadow-sm border-b-8 border-green-600 hover:shadow-xl transition cursor-pointer" onclick="openPlanilla(${m.id})">
                    <div class="w-12 h-12 bg-green-50 text-green-600 rounded-2xl flex items-center justify-center mb-4"><i class="fas fa-book"></i></div>
                    <h3 class="font-black text-gray-800 uppercase text-xs">${m.nombre}</h3>
                    <p class="text-[9px] text-gray-400 font-bold mt-2 uppercase">${m.matriculados.length} Estudiantes Matriculados</p>
                </div>`).join('');
        }

        function openPlanilla(id) {
            curMatId = id;
            const m = (JSON.parse(localStorage.getItem('db_materias')) || []).find(x => x.id == id);
            document.getElementById('modal_mat_name').innerText = m.nombre;
            document.getElementById('modal_planilla').classList.add('active');
            setPeriodo(1);
        }

        function setPeriodo(p) {
            curPer = p;
            document.querySelectorAll('[id$="_btn"]').forEach(b => b.className = "flex-1 py-4 font-black text-xs uppercase text-gray-400");
            document.getElementById('p'+p+'_btn').className = "flex-1 py-4 font-black text-xs uppercase active-p-btn";
            renderPlanilla();
        }

        function renderPlanilla() {
            const m = (JSON.parse(localStorage.getItem('db_materias')) || []).find(x => x.id == curMatId);
            const dbN = JSON.parse(localStorage.getItem('db_notas')) || {};
            const crono = JSON.parse(localStorage.getItem('cronograma')) || {};
            const msg = document.getElementById('status_msg');
            
            // Validar bloqueo
            let isLocked = true;
            if(crono[curPer]) {
                const ahora = new Date();
                const ini = new Date(crono[curPer].inicio);
                const cie = new Date(crono[curPer].cierre);
                if(ahora >= ini && ahora <= cie) isLocked = false;
            }

            msg.innerText = isLocked ? "Periodo bloqueado (Fuera de fecha)" : "Periodo abierto (Modo Edición)";
            msg.className = "mb-4 p-3 rounded-xl text-[10px] font-black text-center uppercase " + (isLocked ? "bg-red-100 text-red-600" : "bg-green-100 text-green-600");

            document.getElementById('planilla_rows').innerHTML = m.matriculados.map(est => {
                const uD = JSON.parse(localStorage.getItem(est)) || {fullname: est};
                const key = `${curMatId}_${curPer}_${est}`;
                const n = dbN[key] || {n1:0, n2:0, n3:0};
                const def = (n.n1*0.3 + n.n2*0.3 + n.n3*0.4).toFixed(1);
                return `
                    <tr class="text-xs">
                        <td class="py-3 font-bold text-gray-700">${uD.fullname}</td>
                        <td class="py-3 text-center"><input type="number" step="0.1" value="${n.n1}" onchange="saveN('${est}',1,this.value)" ${isLocked?'disabled':''} class="w-14 border rounded p-1 text-center font-bold"></td>
                        <td class="py-3 text-center"><input type="number" step="0.1" value="${n.n2}" onchange="saveN('${est}',2,this.value)" ${isLocked?'disabled':''} class="w-14 border rounded p-1 text-center font-bold"></td>
                        <td class="py-3 text-center"><input type="number" step="0.1" value="${n.n3}" onchange="saveN('${est}',3,this.value)" ${isLocked?'disabled':''} class="w-14 border rounded p-1 text-center font-bold"></td>
                        <td class="py-3 text-center font-black text-blue-600 bg-blue-50 rounded-lg">${def}</td>
                    </tr>`;
            }).join('');
        }

        function saveN(est, num, val) {
            let db = JSON.parse(localStorage.getItem('db_notas')) || {};
            const key = `${curMatId}_${curPer}_${est}`;
            if(!db[key]) db[key] = {n1:0, n2:0, n3:0};
            db[key]['n'+num] = parseFloat(val) || 0;
            localStorage.setItem('db_notas', JSON.stringify(db));
            renderPlanilla();
        }

        // --- ESTUDIANTE ---
        function loadEstudiante() {
            const mats = JSON.parse(localStorage.getItem('db_materias')) || [];
            const misMats = mats.filter(m => m.matriculados.includes(sesion.user));
            const dbN = JSON.parse(localStorage.getItem('db_notas')) || {};
            const grid = document.getElementById('est_boletin');
            
            if(misMats.length === 0) return grid.innerHTML = "<p class='col-span-2 text-center py-20 opacity-40 font-bold uppercase'>No estás matriculado en ninguna materia.</p>";

            grid.innerHTML = misMats.map(m => {
                let p_html = `<div class="bg-white p-6 rounded-3xl shadow-sm border-l-8 border-indigo-600">
                    <h3 class="font-black text-indigo-900 uppercase text-[11px] mb-4">${m.nombre}</h3>
                    <div class="grid grid-cols-3 gap-2">`;
                for(let p=1; p<=3; p++) {
                    const key = `${m.id}_${p}_${sesion.user}`;
                    const n = dbN[key] || {n1:0, n2:0, n3:0};
                    const f = (n.n1*0.3 + n.n2*0.3 + n.n3*0.4).toFixed(1);
                    p_html += `
                        <div class="bg-gray-50 p-3 rounded-2xl text-center border">
                            <p class="text-[8px] font-black text-gray-400 uppercase">Per ${p}</p>
                            <p class="text-lg font-black ${f >= 3 ? 'text-indigo-600' : 'text-red-500'}">${f}</p>
                        </div>`;
                }
                return p_html + `</div></div>`;
            }).join('');
        }

        // --- HELPERS ---
        function deleteUser(u) { if(confirm("¿Borrar?")){ localStorage.removeItem(u); loadAdmin(); } }
        function closePlanilla() { document.getElementById('modal_planilla').classList.remove('active'); }
        function logout() { sessionStorage.clear(); window.location.href = 'index.html'; }
    </script>
</body>
</html>
