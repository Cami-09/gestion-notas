<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sistema Académico | Gestión Total</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .sidebar-admin { background: #1e3a8a; }
        .sidebar-docente { background: #065f46; }
        .sidebar-estudiante { background: #3730a3; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="bg-gray-100 flex h-screen overflow-hidden text-sm">

    <aside id="sidebar" class="w-64 text-white flex flex-col shadow-xl transition-colors duration-500">
        <div class="p-6 border-b border-white/10 text-center">
            <h1 class="text-xl font-bold tracking-tighter" id="panelType">PANEL CARGANDO...</h1>
        </div>
        <nav class="mt-6 flex-1 px-4 space-y-2" id="menuOptions">
            </nav>
        <div class="p-4 bg-black/20">
            <button onclick="logout()" class="w-full py-2 bg-red-600 rounded font-bold hover:bg-red-700">SALIR</button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col overflow-y-auto">
        <header class="bg-white p-4 shadow flex justify-between items-center px-8 border-b-4" id="headerBorder">
            <div>
                <h2 id="viewTitle" class="text-xl font-black text-gray-700 uppercase">Bienvenido</h2>
                <p id="plazoInfo" class="text-xs text-red-600 font-bold"></p>
            </div>
            <div class="text-right">
                <p id="navUserName" class="font-bold text-gray-900"></p>
                <p id="navUserRole" class="text-xs uppercase text-gray-500 font-bold"></p>
            </div>
        </header>

        <div class="p-6">
            <div id="view-admin" class="tab-content">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="bg-white p-6 rounded-xl shadow-sm border-t-4 border-blue-600">
                        <h3 class="font-bold mb-4 italic">1. Configurar Plazos (Fechas)</h3>
                        <div class="space-y-3">
                            <input type="date" id="admin_fecha_cierre" class="w-full p-2 border rounded">
                            <button onclick="adminGuardarFecha()" class="w-full bg-blue-600 text-white py-2 rounded font-bold">ESTABLECER CIERRE</button>
                        </div>
                    </div>
                    <div class="bg-white p-6 rounded-xl shadow-sm border-t-4 border-blue-600">
                        <h3 class="font-bold mb-4 italic">2. Crear Usuario (Cualquier Rol)</h3>
                        <div class="space-y-2">
                            <input type="text" id="adm_user" placeholder="Usuario" class="w-full p-2 border rounded text-xs">
                            <input type="password" id="adm_pass" placeholder="Contraseña" class="w-full p-2 border rounded text-xs">
                            <select id="adm_role" class="w-full p-2 border rounded text-xs">
                                <option value="Estudiante">Estudiante</option>
                                <option value="Docente">Docente</option>
                                <option value="Administrativo">Administrativo</option>
                            </select>
                            <button onclick="adminCrearUser()" class="w-full bg-black text-white py-2 rounded font-bold">REGISTRAR</button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="view-docente" class="tab-content">
                <div class="bg-white p-6 rounded-xl shadow-sm border-t-4 border-green-600">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="font-bold text-lg">Planilla de Calificaciones</h3>
                        <select id="doc_asignatura" class="p-2 border rounded bg-gray-50">
                            <option>Matemáticas - 10°A</option>
                            <option>Física - 11°B</option>
                        </select>
                    </div>
                    <table class="w-full border-collapse">
                        <thead>
                            <tr class="bg-gray-100 text-left">
                                <th class="p-3 border">Estudiante</th>
                                <th class="p-3 border text-center">Nota 1 (30%)</th>
                                <th class="p-3 border text-center">Nota 2 (30%)</th>
                                <th class="p-3 border text-center">Examen (40%)</th>
                                <th class="p-3 border text-center">Acción</th>
                            </tr>
                        </thead>
                        <tbody id="listaEstudiantesNotas">
                            </tbody>
                    </table>
                </div>
            </div>

            <div id="view-estudiante" class="tab-content">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6" id="cardsEstudiante">
                    </div>
                <div class="bg-white p-6 rounded-xl shadow-sm border-t-4 border-indigo-600">
                    <h3 class="font-bold mb-4 italic">Mi Boletín Parcial</h3>
                    <div id="boletinContent"></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // CARGAR SESIÓN
        const sesion = JSON.parse(sessionStorage.getItem('activeUser'));
        if(!sesion) window.location.href = 'index.html';

        // BASE DE DATOS DE NOTAS (Simulada en LocalStorage)
        let DB_NOTAS = JSON.parse(localStorage.getItem('db_notas')) || {};

        window.onload = function() {
            document.getElementById('navUserName').innerText = sesion.user;
            document.getElementById('navUserRole').innerText = sesion.role;
            configurarInterfazPorRol();
        }

        function configurarInterfazPorRol() {
            const side = document.getElementById('sidebar');
            const menu = document.getElementById('menuOptions');
            const border = document.getElementById('headerBorder');
            const fechaCierre = localStorage.getItem('fecha_cierre') || 'No definida';
            
            document.getElementById('plazoInfo').innerText = "CIERRE DE SISTEMA: " + fechaCierre;

            if(sesion.role === 'Administrativo') {
                side.className = "w-64 sidebar-admin text-white flex flex-col shadow-xl";
                border.className = "bg-white p-4 shadow flex justify-between items-center px-8 border-b-4 border-blue-600";
                document.getElementById('panelType').innerText = "ADMINISTRACIÓN";
                menu.innerHTML = `<button onclick="showTab('admin')" class="w-full text-left p-2 hover:bg-white/10 rounded">⚙️ Configuración General</button>`;
                showTab('admin');
            } 
            else if(sesion.role === 'Docente') {
                side.className = "w-64 sidebar-docente text-white flex flex-col shadow-xl";
                border.className = "bg-white p-4 shadow flex justify-between items-center px-8 border-b-4 border-green-600";
                document.getElementById('panelType').innerText = "DOCENTES";
                menu.innerHTML = `<button onclick="showTab('docente')" class="w-full text-left p-2 hover:bg-white/10 rounded">📝 Calificar Grupos</button>`;
                cargarPlanillaDocente();
                showTab('docente');
                validarFechaCierre();
            }
            else {
                side.className = "w-64 sidebar-estudiante text-white flex flex-col shadow-xl";
                border.className = "bg-white p-4 shadow flex justify-between items-center px-8 border-b-4 border-indigo-600";
                document.getElementById('panelType').innerText = "ESTUDIANTES";
                menu.innerHTML = `<button onclick="showTab('estudiante')" class="w-full text-left p-2 hover:bg-white/10 rounded">📊 Mis Calificaciones</button>`;
                cargarNotasEstudiante();
                showTab('estudiante');
            }
        }

        function showTab(name) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById('view-' + name).classList.add('active');
            document.getElementById('viewTitle').innerText = "Módulo de " + name;
        }

        // --- FUNCIONES ADMIN ---
        function adminGuardarFecha() {
            const f = document.getElementById('admin_fecha_cierre').value;
            localStorage.setItem('fecha_cierre', f);
            alert("Fecha de cierre actualizada a: " + f);
            location.reload();
        }

        function adminCrearUser() {
            const u = document.getElementById('adm_user').value;
            const p = document.getElementById('adm_pass').value;
            const r = document.getElementById('adm_role').value;
            if(!u || !p) return alert("Faltan datos");
            localStorage.setItem(u, JSON.stringify({user: u, pass: p, role: r}));
            alert("Usuario " + u + " creado.");
        }

        // --- FUNCIONES DOCENTE ---
        function cargarPlanillaDocente() {
            const tabla = document.getElementById('listaEstudiantesNotas');
            // Buscamos todos los usuarios que sean estudiantes en el localStorage
            let estudiantes = [];
            for(let i=0; i<localStorage.length; i++){
                let k = localStorage.key(i);
                let d = JSON.parse(localStorage.getItem(k));
                if(d.role === 'Estudiante') estudiantes.push(d.user);
            }

            tabla.innerHTML = estudiantes.map(est => {
                let n = DB_NOTAS[est] || {n1:0, n2:0, n3:0};
                return `
                    <tr class="border-b">
                        <td class="p-3 font-bold">${est}</td>
                        <td class="p-3"><input type="number" id="n1_${est}" value="${n.n1}" class="w-16 p-1 border text-center nota-input"></td>
                        <td class="p-3"><input type="number" id="n2_${est}" value="${n.n2}" class="w-16 p-1 border text-center nota-input"></td>
                        <td class="p-3"><input type="number" id="n3_${est}" value="${n.n3}" class="w-16 p-1 border text-center nota-input"></td>
                        <td class="p-3 text-center">
                            <button onclick="guardarNotaEstudiante('${est}')" class="bg-green-600 text-white px-3 py-1 rounded text-xs btn-guardar">GUARDAR</button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function guardarNotaEstudiante(est) {
            const n1 = parseFloat(document.getElementById(`n1_${est}`).value);
            const n2 = parseFloat(document.getElementById(`n2_${est}`).value);
            const n3 = parseFloat(document.getElementById(`n3_${est}`).value);
            
            DB_NOTAS[est] = { n1, n2, n3 };
            localStorage.setItem('db_notas', JSON.stringify(DB_NOTAS));
            alert("Notas guardadas para " + est);
        }

        function validarFechaCierre() {
            const limite = new Date(localStorage.getItem('fecha_cierre'));
            const hoy = new Date();
            if(hoy > limite) {
                document.querySelectorAll('.nota-input').forEach(i => i.disabled = true);
                document.querySelectorAll('.btn-guardar').forEach(b => b.style.display = 'none');
                document.getElementById('plazoInfo').innerText = "⚠️ SISTEMA CERRADO - PLAZO VENCIDO";
            }
        }

        // --- FUNCIONES ESTUDIANTE ---
        function cargarNotasEstudiante() {
            const misNotas = DB_NOTAS[sesion.user] || {n1:0, n2:0, n3:0};
            const prom = (misNotas.n1*0.3 + misNotas.n2*0.3 + misNotas.n3*0.4).toFixed(2);
            
            document.getElementById('cardsEstudiante').innerHTML = `
                <div class="bg-white p-4 rounded-lg shadow border-l-4 border-indigo-600">
                    <p class="text-xs font-bold text-gray-400 uppercase">Promedio Actual</p>
                    <p class="text-3xl font-black">${prom}</p>
                </div>
            `;

            document.getElementById('boletinContent').innerHTML = `
                <table class="w-full text-left">
                    <tr class="border-b"> <td class="py-2 text-gray-500">Parcial 1 (30%)</td> <td class="font-bold">${misNotas.n1}</td> </tr>
                    <tr class="border-b"> <td class="py-2 text-gray-500">Parcial 2 (30%)</td> <td class="font-bold">${misNotas.n2}</td> </tr>
                    <tr class="border-b"> <td class="py-2 text-gray-500">Examen Final (40%)</td> <td class="font-bold">${misNotas.n3}</td> </tr>
                </table>
            `;
        }

        function logout() {
            sessionStorage.clear();
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
