<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Integra Pro v29.0 | Elite Framework</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: #f8fafc; }
        
        .tab-content { display: none; }
        .tab-content.active { display: block !important; }

        .sidebar-admin { background: #0f172a; border-right: 1px solid #1e293b; }
        .sidebar-docente { background: #064e3b; border-right: 1px solid #065f46; }
        .sidebar-estudiante { background: #1e1b4b; border-right: 1px solid #312e81; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .modal.active { display: flex; }

        .glass-card { background: #0f172a; border: 1px solid #1e293b; border-radius: 1.5rem; transition: all 0.3s ease; }
        .glass-card:hover { border-color: #f97316; }

        .input-nota { background: #020617; border: 1px solid #1e293b; color: white; width: 55px; height: 35px; text-align: center; font-weight: 800; border-radius: 0.5rem; }
        .input-nota:focus { border-color: #f97316; outline: none; }
        .input-desc { background: #1e293b; color: #94a3b8; font-size: 10px; padding: 5px; border-radius: 0.4rem; width: 100%; border: none; margin-top: 4px; }

        .nota-red { color: #ef4444 !important; border-color: #ef4444 !important; } 
        .nota-orange { color: #f97316 !important; border-color: #f97316 !important; } 
        .nota-green { color: #10b981 !important; border-color: #10b981 !important; }

        .accordion-content { max-height: 0; overflow: hidden; transition: all 0.3s ease-out; }
        .accordion-content.open { max-height: 3000px; padding-top: 1rem; }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <aside id="sidebar" class="w-64 flex flex-col shadow-2xl transition-all duration-300">
        <div class="p-6 border-b border-white/5 flex items-center gap-3">
            <div class="bg-orange-500 p-2 rounded-xl shadow-lg"><i class="fas fa-shield-alt text-xl"></i></div>
            <h1 class="text-xl font-extrabold tracking-tighter italic">INTEGRA<span class="text-orange-500">PRO</span></h1>
        </div>
        <nav id="menu-nav" class="mt-8 flex-1 px-4 space-y-2"></nav>
        <div class="p-4 bg-black/20 text-[10px] text-center font-bold opacity-40 uppercase italic tracking-widest">v29.0 Build Stable</div>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="h-20 bg-[#0f172a]/50 backdrop-blur-md border-b border-white/5 flex justify-between items-center px-8">
            <h2 id="view-title" class="text-lg font-black text-white uppercase italic tracking-tighter">Cargando...</h2>
            <div class="flex items-center gap-6">
                <div class="text-right">
                    <p id="navFullName" class="font-extrabold text-white text-md leading-none"></p>
                    <p id="navRole" class="text-[10px] uppercase text-orange-500 font-black mt-1 tracking-widest"></p>
                </div>
                <button onclick="logout()" class="w-10 h-10 bg-red-500/10 text-red-500 rounded-xl flex items-center justify-center hover:bg-red-500 hover:text-white transition-all">
                    <i class="fas fa-power-off text-sm"></i>
                </button>
            </div>
        </header>

        <div id="content-scroll" class="p-8 overflow-y-auto h-full">
            
            <div id="view-admin-main" class="tab-content space-y-6">
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <div class="glass-card p-6">
                        <h3 class="text-xs font-black uppercase mb-4 text-orange-500 italic">Registro de Personal</h3>
                        <div class="grid grid-cols-2 gap-4">
                            <input type="text" id="adm_u_name" placeholder="Nombre Completo" class="bg-[#020617] border border-white/10 p-3 rounded-xl text-white text-xs">
                            <input type="text" id="adm_u_user" placeholder="Usuario ID" class="bg-[#020617] border border-white/10 p-3 rounded-xl text-white text-xs">
                            <input type="password" id="adm_u_pass" placeholder="Password" class="bg-[#020617] border border-white/10 p-3 rounded-xl text-white text-xs">
                            <select id="adm_u_role" class="bg-[#020617] border border-white/10 p-3 rounded-xl text-white text-xs font-bold">
                                <option value="Estudiante">Estudiante</option>
                                <option value="Docente">Docente</option>
                                <option value="Administrativo">Administrativo</option>
                            </select>
                        </div>
                        <button onclick="saveUser()" class="w-full mt-4 bg-orange-600 py-3 rounded-xl font-black uppercase text-[10px] italic">Guardar Usuario</button>
                    </div>

                    <div class="glass-card p-6">
                        <h3 class="text-xs font-black uppercase mb-4 text-blue-500 italic">Estructura Académica</h3>
                        <div class="space-y-4">
                            <div class="flex gap-2">
                                <input type="text" id="adm_m_name" placeholder="Nombre Asignatura" class="flex-1 bg-[#020617] border border-white/10 p-3 rounded-xl text-white text-xs">
                                <button onclick="saveMateria()" class="bg-blue-600 px-6 rounded-xl font-black uppercase text-[10px]">Crear</button>
                            </div>
                            <div class="flex gap-2">
                                <select id="sel_dest_mat" class="flex-1 bg-[#020617] border border-white/10 p-3 rounded-xl text-white text-[10px]"></select>
                                <select id="sel_dest_user" class="flex-1 bg-[#020617] border border-white/10 p-3 rounded-xl text-white text-[10px]"></select>
                                <button onclick="matricularAction()" class="bg-indigo-600 px-4 rounded-xl font-black uppercase text-[10px]">Vincular</button>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="glass-card overflow-hidden">
                        <div class="p-3 bg-white/5 text-[9px] font-black uppercase italic opacity-50">Base de Usuarios</div>
                        <div id="list_users" class="max-h-60 overflow-y-auto"></div>
                    </div>
                    <div class="glass-card overflow-hidden">
                        <div class="p-3 bg-white/5 text-[9px] font-black uppercase italic opacity-50">Base de Materias</div>
                        <div id="list_mats" class="max-h-60 overflow-y-auto"></div>
                    </div>
                </div>
            </div>

            <div id="view-admin-config" class="tab-content">
                <div class="glass-card p-8 space-y-10">
                    <div id="config_items_container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4"></div>
                    <div id="config_periods_container" class="grid grid-cols-1 md:grid-cols-3 gap-6 pt-6 border-t border-white/5"></div>
                    <div class="p-6 bg-[#020617] rounded-2xl border border-white/5">
                        <h4 class="text-[10px] font-black uppercase text-orange-500 mb-4">Límites de Rúbrica</h4>
                        <div class="grid grid-cols-3 gap-4">
                            <input type="number" id="rub_bajo_input" class="bg-[#0f172a] p-3 rounded-xl text-red-500 font-bold border border-red-500/20">
                            <input type="number" id="rub_basico_input" class="bg-[#0f172a] p-3 rounded-xl text-orange-500 font-bold border border-orange-500/20">
                            <input type="number" id="rub_alto_input" class="bg-[#0f172a] p-3 rounded-xl text-green-500 font-bold border border-green-500/20">
                        </div>
                    </div>
                    <button onclick="saveGlobalConfig()" class="bg-indigo-600 px-12 py-4 rounded-2xl font-black uppercase italic text-xs shadow-lg">Guardar Configuración Global</button>
                </div>
            </div>

            <div id="view-docente-mats" class="tab-content">
                <div id="docente_cards_container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
            </div>

            <div id="view-estudiante-main" class="tab-content">
                <div class="bg-indigo-600 p-10 rounded-[2.5rem] flex justify-between items-center mb-8">
                    <div>
                        <h3 class="text-2xl font-black italic uppercase">Mi Perfil Académico</h3>
                        <p class="text-[10px] font-bold opacity-70 uppercase tracking-widest mt-1">Revisión de notas y promedios por periodo</p>
                    </div>
                    <button onclick="abrirSelectorUniversal()" class="bg-white text-indigo-600 px-8 py-3 rounded-xl font-black uppercase text-xs italic">Periodos</button>
                </div>
                <div id="boletin_container" class="space-y-6"></div>
            </div>
        </div>
    </main>

    <div id="modal_periodos" class="modal">
        <div class="bg-[#0f172a] w-full max-w-sm rounded-[2rem] border border-white/10 overflow-hidden shadow-2xl">
            <div class="p-6 bg-slate-900 flex justify-between items-center border-b border-white/5">
                <span class="font-black uppercase text-xs italic tracking-widest">Selector de Ciclo</span>
                <button onclick="closeModal('modal_periodos')" class="text-2xl">&times;</button>
            </div>
            <div id="period_list_container" class="p-6 space-y-3"></div>
        </div>
    </div>

    <div id="modal_planilla" class="modal">
        <div class="bg-[#020617] w-full h-full flex flex-col">
            <header class="p-6 bg-[#0f172a] border-b border-white/10 flex justify-between items-center shadow-xl">
                <div class="flex items-center gap-6">
                    <button onclick="closeModal('modal_planilla')" class="w-10 h-10 bg-white/5 rounded-xl flex items-center justify-center hover:bg-orange-500"><i class="fas fa-arrow-left text-xs"></i></button>
                    <div>
                        <h2 id="planilla_header_txt" class="text-xl font-black uppercase italic tracking-tighter"></h2>
                        <p id="period_dates_info" class="text-[9px] font-bold text-gray-500 uppercase tracking-widest"></p>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <div id="timer_display" class="bg-red-500/10 text-red-500 px-4 py-2 rounded-xl border border-red-500/20 text-[9px] font-black uppercase"></div>
                    <button id="save_btn" onclick="saveNotasDB()" class="bg-orange-600 px-8 py-3 rounded-xl font-black uppercase italic text-xs">Guardar Cambios</button>
                </div>
            </header>
            <div class="flex-1 overflow-auto p-8">
                <div id="planilla_items_header" class="flex gap-4 mb-8 overflow-x-auto pb-4"></div>
                <div id="planilla_students_list" class="space-y-4 pb-20"></div>
            </div>
            <footer class="p-4 bg-[#0f172a] border-t border-white/10 text-center"><span id="lock_msg" class="text-[9px] font-black uppercase italic opacity-40"></span></footer>
        </div>
    </div>

    <script>
        // --- DATA SYSTEM ---
        const sesion = JSON.parse(sessionStorage.getItem('activeUser'));
        if(!sesion) window.location.href = 'index.html';

        let db_users = JSON.parse(localStorage.getItem('db_users')) || { 'admin': { user: 'admin', pass: '123', fullname: 'Administrador', role: 'Administrativo' } };
        let db_mats = JSON.parse(localStorage.getItem('db_mats')) || [];
        let db_notas = JSON.parse(localStorage.getItem('db_notas')) || {};
        let db_conf = JSON.parse(localStorage.getItem('db_conf')) || {
            items: [
                { id: 'acad', name: 'Académico', weight: 65, count: 8, color: '#9333ea' },
                { id: 'eval', name: 'Acumulativa', weight: 15, count: 1, color: '#2563eb' },
                { id: 'pers', name: 'Personal', weight: 10, count: 3, color: '#059669' },
                { id: 'soci', name: 'Social', weight: 10, count: 3, color: '#0891b2' }
            ],
            periodos: { 1: {start:'', end:''}, 2: {start:'', end:''}, 3: {start:'', end:''} },
            rubrica: { bajo: 29, basico: 39, alto: 50 }
        };

        let curMat = null, curPer = null, timerInterval = null, isLocked = false;

        window.onload = () => {
            document.getElementById('navFullName').innerText = sesion.fullname;
            document.getElementById('navRole').innerText = sesion.role;
            document.getElementById('sidebar').className = `w-64 flex flex-col sidebar-${sesion.role.toLowerCase().replace('administrativo','admin')}`;
            renderMenu();
            loadHome();
        };

        function renderMenu() {
            const nav = document.getElementById('menu-nav');
            let h = `<button onclick="loadHome()" class="w-full text-left p-4 hover:bg-orange-500 rounded-2xl font-black text-[10px] uppercase italic transition-all flex items-center gap-3"><i class="fas fa-home"></i> Inicio</button>`;
            if(sesion.role === 'Administrativo') {
                h += `<button onclick="showView('admin-main')" class="w-full text-left p-4 hover:bg-orange-500 rounded-2xl font-black text-[10px] uppercase italic transition-all flex items-center gap-3"><i class="fas fa-users-cog"></i> Estructura</button>
                      <button onclick="showView('admin-config')" class="w-full text-left p-4 hover:bg-orange-500 rounded-2xl font-black text-[10px] uppercase italic transition-all flex items-center gap-3"><i class="fas fa-sliders-h"></i> Parámetros</button>`;
            } else if(sesion.role === 'Docente') {
                h += `<button onclick="showView('docente-mats')" class="w-full text-left p-4 hover:bg-orange-500 rounded-2xl font-black text-[10px] uppercase italic transition-all flex items-center gap-3"><i class="fas fa-file-signature"></i> Planillas</button>`;
            } else {
                h += `<button onclick="showView('estudiante-main')" class="w-full text-left p-4 hover:bg-orange-500 rounded-2xl font-black text-[10px] uppercase italic transition-all flex items-center gap-3"><i class="fas fa-award"></i> Notas</button>`;
            }
            nav.innerHTML = h;
        }

        function showView(v) {
            document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
            document.getElementById(`view-${v}`).classList.add('active');
            if(v === 'admin-main') loadAdmin();
            if(v === 'admin-config') loadConfig();
            if(v === 'docente-mats') loadDocente();
            document.getElementById('view-title').innerText = v.replace('-',' ').toUpperCase();
        }

        function loadHome() {
            if(sesion.role === 'Administrativo') showView('admin-main');
            else if(sesion.role === 'Docente') showView('docente-mats');
            else showView('estudiante-main');
        }

        function getNotaColor(val) {
            const v = parseFloat(val); if(!v) return "text-gray-600";
            if(v <= db_conf.rubrica.bajo) return "nota-red";
            if(v <= db_conf.rubrica.basico) return "nota-orange";
            return "nota-green";
        }

        // --- ADMIN ---
        function loadAdmin() {
            document.getElementById('list_users').innerHTML = Object.values(db_users).map(u => `
                <div class="flex justify-between p-4 hover:bg-white/5 items-center border-b border-white/5">
                    <div><b class="text-white text-xs">${u.fullname}</b><p class="text-[8px] uppercase text-gray-500">${u.role} | @${u.user}</p></div>
                    <button onclick="deleteUser('${u.user}')" class="text-red-500 hover:scale-110 transition"><i class="fas fa-trash-alt"></i></button>
                </div>`).join('');
            document.getElementById('list_mats').innerHTML = db_mats.map(m => `
                <div class="flex justify-between p-4 hover:bg-white/5 items-center border-b border-white/5">
                    <div><b class="text-white text-xs">${m.nombre}</b><p class="text-[8px] uppercase text-blue-400">Prof: ${db_users[m.docente]?.fullname || 'Pendiente'}</p></div>
                    <div class="flex gap-4">
                        <button onclick="abrirSelectorUniversal(${m.id})" class="text-emerald-400 text-[9px] font-black uppercase italic">Notas</button>
                        <button onclick="deleteMat(${m.id})" class="text-red-500 hover:scale-110 transition"><i class="fas fa-trash-alt"></i></button>
                    </div>
                </div>`).join('');
            document.getElementById('sel_dest_mat').innerHTML = db_mats.map(m => `<option value="${m.id}">${m.nombre}</option>`).join('');
            document.getElementById('sel_dest_user').innerHTML = Object.values(db_users).map(u => `<option value="${u.user}">${u.fullname} (${u.role})</option>`).join('');
        }

        function saveUser() {
            const u = document.getElementById('adm_u_user').value.trim(); const p = document.getElementById('adm_u_pass').value.trim();
            const n = document.getElementById('adm_u_name').value.trim(); const r = document.getElementById('adm_u_role').value;
            if(!u || !p || !n) return alert("Faltan datos");
            db_users[u] = { user:u, pass:p, fullname:n, role:r }; localStorage.setItem('db_users', JSON.stringify(db_users));
            alert("Usuario Registrado"); loadAdmin();
        }
        function deleteUser(u) { if(u!=='admin' && confirm("¿Borrar?")){ delete db_users[u]; localStorage.setItem('db_users', JSON.stringify(db_users)); loadAdmin(); } }
        function saveMateria() { const n = document.getElementById('adm_m_name').value; if(n){ db_mats.push({id:Date.now(), nombre:n, alumnos:[], docente:null, item_counts:{}, item_names:{}}); localStorage.setItem('db_mats', JSON.stringify(db_mats)); loadAdmin(); } }
        function deleteMat(id) { if(confirm("¿Borrar?")){ db_mats = db_mats.filter(m=>m.id!=id); localStorage.setItem('db_mats', JSON.stringify(db_mats)); loadAdmin(); } }
        function matricularAction() {
            const m = db_mats.find(x => x.id == document.getElementById('sel_dest_mat').value);
            const uId = document.getElementById('sel_dest_user').value;
            const u = db_users[uId];
            if(u.role === 'Docente') m.docente = uId; 
            else if(u.role === 'Estudiante' && !m.alumnos.includes(uId)) m.alumnos.push(uId);
            localStorage.setItem('db_mats', JSON.stringify(db_mats)); alert("Vinculación Exitosa"); loadAdmin();
        }

        // --- CONFIG ---
        function loadConfig() {
            document.getElementById('rub_bajo_input').value = db_conf.rubrica.bajo;
            document.getElementById('rub_basico_input').value = db_conf.rubrica.basico;
            document.getElementById('rub_alto_input').value = db_conf.rubrica.alto;
            document.getElementById('config_items_container').innerHTML = db_conf.items.map((it, i) => `
                <div class="bg-[#020617] p-4 rounded-2xl border border-white/5 item-eval-row">
                    <input type="text" class="it-name w-full font-black text-[10px] uppercase bg-transparent border-b border-indigo-500/30 mb-3 text-indigo-400" value="${it.name}">
                    <div class="grid grid-cols-2 gap-2 text-[8px] font-bold">
                        <div>PESO %<input type="number" class="it-weight w-full bg-[#0f172a] rounded p-1 mt-1 border-none" value="${it.weight}"></div>
                        <div>NOTAS<input type="number" class="it-count w-full bg-[#0f172a] rounded p-1 mt-1 border-none" value="${it.count}"></div>
                    </div>
                </div>`).join('');
            document.getElementById('config_periods_container').innerHTML = [1,2,3].map(p => `
                <div class="bg-[#020617] p-4 rounded-2xl border border-white/5 period-config-row" data-p="${p}">
                    <h4 class="font-black text-[9px] uppercase text-indigo-500 mb-3 italic">Periodo ${p}</h4>
                    <input type="datetime-local" class="p-start w-full bg-[#0f172a] text-[10px] p-2 rounded-xl mb-2 border-none" value="${db_conf.periodos[p].start || ''}">
                    <input type="datetime-local" class="p-end w-full bg-[#0f172a] text-[10px] p-2 rounded-xl border-none" value="${db_conf.periodos[p].end || ''}">
                </div>`).join('');
        }

        function saveGlobalConfig() {
            db_conf.rubrica.bajo = parseInt(document.getElementById('rub_bajo_input').value);
            db_conf.rubrica.basico = parseInt(document.getElementById('rub_basico_input').value);
            db_conf.rubrica.alto = parseInt(document.getElementById('rub_alto_input').value);
            document.querySelectorAll('.item-eval-row').forEach((row, i) => {
                db_conf.items[i].name = row.querySelector('.it-name').value;
                db_conf.items[i].weight = parseFloat(row.querySelector('.it-weight').value);
                db_conf.items[i].count = parseInt(row.querySelector('.it-count').value);
            });
            document.querySelectorAll('.period-config-row').forEach(row => {
                const p = row.dataset.p;
                db_conf.periodos[p].start = row.querySelector('.p-start').value;
                db_conf.periodos[p].end = row.querySelector('.p-end').value;
            });
            localStorage.setItem('db_conf', JSON.stringify(db_conf)); 
            alert("Sistema Actualizado"); location.reload();
        }

        // --- PLANILLA ---
        function changeColumnCount(itId, delta) {
            if(sesion.role !== 'Administrativo') return;
            if(!curMat.item_counts) curMat.item_counts = {};
            const current = curMat.item_counts[`${curPer}_${itId}`] ?? db_conf.items.find(x => x.id === itId).count;
            curMat.item_counts[`${curPer}_${itId}`] = Math.max(1, current + delta);
            localStorage.setItem('db_mats', JSON.stringify(db_mats));
            abrirPlanilla(curPer);
        }

        function getNotaCount(itId) {
            return curMat.item_counts?.[`${curPer}_${itId}`] ?? db_conf.items.find(x => x.id === itId).count;
        }

        function abrirSelectorUniversal(mid = null) {
            if(mid) curMat = db_mats.find(m => m.id == mid);
            openModal('modal_periodos');
            document.getElementById('period_list_container').innerHTML = [1,2,3].map(p => `
                <div onclick="${sesion.role === 'Estudiante' ? `renderBoletinVertical(${p})` : `abrirPlanilla(${p})`}" class="bg-[#020617] border border-white/5 p-4 rounded-xl flex justify-between items-center cursor-pointer hover:border-orange-500 transition-all group">
                    <span class="font-black text-[10px] uppercase text-gray-500 group-hover:text-white">Periodo ${p}</span>
                    <i class="fas fa-arrow-right text-gray-700 group-hover:text-orange-500"></i>
                </div>`).join('');
        }

        function loadDocente() {
            const mis = db_mats.filter(m => m.docente === sesion.user);
            document.getElementById('docente_cards_container').innerHTML = mis.map(m => `
                <div class="glass-card p-6 flex flex-col justify-between">
                    <div>
                        <div class="w-12 h-12 bg-orange-500/10 text-orange-500 rounded-xl flex items-center justify-center text-xl mb-4 border border-orange-500/20"><i class="fas fa-book"></i></div>
                        <h4 class="text-md font-black text-white uppercase italic mb-1">${m.nombre}</h4>
                        <p class="text-[9px] font-bold text-gray-500 uppercase tracking-widest">${m.alumnos.length} Alumnos</p>
                    </div>
                    <button onclick="abrirSelectorUniversal(${m.id})" class="mt-6 w-full bg-orange-600 py-3 rounded-xl font-black uppercase italic text-[10px]">Cargar Notas</button>
                </div>`).join('');
        }

        function abrirPlanilla(p) {
            curPer = p; closeModal('modal_periodos'); openModal('modal_planilla');
            const isAdmin = sesion.role === 'Administrativo';
            if(isAdmin) { isLocked = false; document.getElementById('lock_msg').innerText = "ADMIN BYPASS"; document.getElementById('save_btn').style.display = 'block'; }
            else { checkLock(db_conf.periodos[p].start, db_conf.periodos[p].end); }
            
            document.getElementById('planilla_header_txt').innerText = `${curMat.nombre} | P${p}`;
            document.getElementById('period_dates_info').innerText = `INICIO: ${db_conf.periodos[p].start || '--'} | CIERRE: ${db_conf.periodos[p].end || '--'}`;

            document.getElementById('planilla_items_header').innerHTML = db_conf.items.map(it => {
                const count = getNotaCount(it.id);
                const customName = curMat.item_names?.[`${curPer}_${it.id}`] ?? it.name;
                return `
                <div class="min-w-[180px] p-4 rounded-2xl border border-white/5 flex flex-col gap-2" style="background: ${it.color}10">
                    <div class="flex justify-between items-center">
                        ${isAdmin ? `<input type="text" class="bg-transparent border-none text-[10px] font-black text-white uppercase it-custom-name w-24" data-itid="${it.id}" value="${customName}">` : `<span class="text-[10px] font-black uppercase text-white">${customName}</span>`}
                        <span class="text-[8px] font-black bg-black/30 px-2 py-0.5 rounded">${it.weight}%</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-[8px] font-bold opacity-50 uppercase">${count} Notas</span>
                        ${isAdmin ? `<div class="flex gap-2"><button onclick="changeColumnCount('${it.id}', 1)" class="w-5 h-5 bg-white/10 rounded flex items-center justify-center text-[10px]">+</button><button onclick="changeColumnCount('${it.id}', -1)" class="w-5 h-5 bg-white/10 rounded flex items-center justify-center text-[10px]">-</button></div>` : ''}
                    </div>
                </div>`;
            }).join('');

            document.getElementById('planilla_students_list').innerHTML = curMat.alumnos.map(uid => {
                const est = db_users[uid] || {fullname: uid}; const key = `${curMat.id}_${curPer}_${uid}`; const n = db_notas[key] || {};
                let itemsHtml = db_conf.items.map(it => {
                    const count = getNotaCount(it.id); let ni = "";
                    for(let i=0; i<count; i++) ni += `<div class="flex flex-col gap-1"><input type="number" class="input-nota ${getNotaColor(n[it.id+'_'+i])}" data-uid="${uid}" data-it="${it.id}" data-idx="${i}" value="${n[it.id+'_'+i] || ''}" ${isLocked?'disabled':''}>
                        <input type="text" class="input-desc" placeholder="Desc..." data-uid="${uid}" data-it="${it.id}" data-idx="${i}" data-type="desc" value="${n[it.id+'_'+i+'_desc'] || ''}" ${isLocked?'disabled':''}></div>`;
                    return `<div class="p-3 bg-white/5 rounded-xl border border-white/5 flex flex-wrap gap-2"><span class="w-full text-[7px] font-black opacity-30 uppercase">${it.name}</span>${ni}</div>`;
                }).join('');
                return `<div class="glass-card p-6 flex flex-col md:flex-row gap-6 items-center">
                    <div class="w-48 text-center border-r border-white/5 pr-4">
                        <h5 class="text-white font-black uppercase italic text-xs mb-1">${est.fullname}</h5>
                        <p id="def_${uid}" class="text-3xl font-black mt-2 tracking-tighter">--</p>
                    </div>
                    <div class="flex-1 grid grid-cols-1 lg:grid-cols-2 gap-4">${itemsHtml}</div>
                </div>`;
            }).join('');
            calc();
        }

        // --- ESTUDIANTE ---
        function renderBoletinVertical(p) {
            curPer = p; closeModal('modal_periodos');
            const mis = db_mats.filter(m => m.alumnos.includes(sesion.user));
            const cont = document.getElementById('boletin_container');
            if(mis.length === 0) return cont.innerHTML = "<p class='text-center py-20 font-black opacity-20 uppercase'>Sin registros</p>";
            cont.innerHTML = mis.map(m => {
                const k = `${m.id}_${p}_${sesion.user}`; const n = db_notas[k] || {}; let det = "", defF = 0;
                db_conf.items.forEach(it => {
                    let s = 0, count = m.item_counts?.[`${p}_${it.id}`] ?? it.count;
                    for(let i=0; i<count; i++) {
                        const v = parseFloat(n[it.id+'_'+i] || 0); s += v;
                        det += `<div class="p-4 bg-[#020617]/50 border border-white/5 rounded-2xl flex items-center gap-4"><div class="w-10 h-10 rounded-lg bg-white/5 flex items-center justify-center font-black text-xs ${getNotaColor(v)}">${v || '0'}</div><div class="flex-1 text-[9px] uppercase font-bold opacity-70">${it.name} | N${i+1}<p class="italic font-normal opacity-50 text-[11px]">"${n[it.id+'_'+i+'_desc'] || 'Sin nota'}"</p></div></div>`;
                    }
                    defF += (count > 0 ? (s/count) : 0) * (it.weight/100);
                });
                return `<div class="glass-card p-6"><div class="flex justify-between items-center mb-6" onclick="this.nextElementSibling.classList.toggle('open')"><div><h4 class="text-xl font-black text-white italic uppercase">${m.nombre}</h4><p class="text-[9px] font-bold text-orange-500 uppercase tracking-[0.3em]">Nota Final: ${defF.toFixed(1)}</p></div><i class="fas fa-chevron-down opacity-20"></i></div><div class="accordion-content grid grid-cols-1 md:grid-cols-2 gap-4">${det}</div></div>`;
            }).join('');
        }

        // --- CORE ---
        function checkLock(start, end) {
            const disp = document.getElementById('timer_display'); const btn = document.getElementById('save_btn');
            if(timerInterval) clearInterval(timerInterval);
            const now = new Date().getTime(); const sDate = new Date(start).getTime(); const eDate = new Date(end).getTime();
            if(!start || !end) { isLocked = true; disp.innerText = "BLOQUEADO"; btn.style.display = 'none'; return; }
            const up = () => {
                const cur = new Date().getTime();
                if(cur < sDate) { isLocked = true; disp.innerText = "BLOQUEADO"; btn.style.display = 'none'; }
                else if(cur > eDate) { isLocked = true; disp.innerText = "SISTEMA CERRADO"; btn.style.display = 'none'; clearInterval(timerInterval); }
                else { isLocked = false; btn.style.display = 'block'; const diff = eDate - cur; const d = Math.floor(diff/(1000*60*60*24)), h = Math.floor((diff%(1000*60*60*24))/(1000*60*60)), m = Math.floor((diff%(1000*60*60))/(1000*60)), s = Math.floor((diff%(1000*60))/1000);
                    disp.innerText = `CIERRE: ${d}d ${h}h ${m}m ${s}s`;
                }
            };
            up(); timerInterval = setInterval(up, 1000);
        }

        function saveNotasDB() {
            if(sesion.role === 'Administrativo') {
                if(!curMat.item_names) curMat.item_names = {};
                document.querySelectorAll('.it-custom-name').forEach(inp => curMat.item_names[`${curPer}_${inp.dataset.itid}`] = inp.value);
                localStorage.setItem('db_mats', JSON.stringify(db_mats));
            }
            document.querySelectorAll('.input-nota').forEach(inp => {
                const {uid, it, idx} = inp.dataset; const key = `${curMat.id}_${curPer}_${uid}`;
                if(!db_notas[key]) db_notas[key] = {}; db_notas[key][`${it}_${idx}`] = inp.value;
                const dInp = document.querySelector(`.input-desc[data-uid="${uid}"][data-it="${it}"][data-idx="${idx}"]`);
                db_notas[key][`${it}_${idx}_desc`] = dInp ? dInp.value : '';
            });
            localStorage.setItem('db_notas', JSON.stringify(db_notas)); alert("Sincronizado"); calc();
        }

        function calc() {
            const alums = sesion.role === 'Estudiante' ? [sesion.user] : curMat.alumnos;
            alums.forEach(uid => {
                let f = 0;
                db_conf.items.forEach(it => {
                    let s = 0; const count = getNotaCount(it.id);
                    for(let i=0; i<count; i++) s += parseFloat(document.querySelector(`.input-nota[data-uid="${uid}"][data-it="${it.id}"][data-idx="${i}"]`)?.value || 0);
                    f += (count > 0 ? (s/count) : 0) * (it.weight/100);
                });
                const el = document.getElementById(`def_${uid}`); if(el){ el.innerText = f.toFixed(1); el.className = `text-3xl font-black mt-2 tracking-tighter ${getNotaColor(f)}`; }
            });
        }

        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); if(timerInterval) clearInterval(timerInterval); }
        function logout() { sessionStorage.clear(); window.location.href = 'index.html'; }
    </script>
</body>
</html>
