<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control | Integra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 flex h-screen">

    <aside class="w-64 bg-blue-900 text-white hidden md:flex flex-col">
        <div class="p-6 border-b border-blue-800 text-center font-bold text-xl uppercase tracking-widest">Integra</div>
        <nav class="mt-4 flex-1">
            <a href="#" class="block px-6 py-3 bg-blue-800 border-l-4 border-orange-400"><i class="fas fa-home mr-3"></i> Menú Principal</a>
            <a href="#" class="block px-6 py-3 hover:bg-blue-800 transition"><i class="fas fa-file-alt mr-3"></i> Mis Notas</a>
            <a href="#" class="block px-6 py-3 hover:bg-blue-800 transition"><i class="fas fa-calendar mr-3"></i> Horarios</a>
        </nav>
        <button onclick="logout()" class="p-4 bg-red-800 hover:bg-red-700 text-sm font-bold"><i class="fas fa-power-off mr-2"></i> SALIR</button>
    </aside>

    <main class="flex-1 flex flex-col">
        <header class="bg-white shadow px-8 py-4 flex justify-between items-center border-b-2 border-orange-400">
            <h2 class="text-blue-900 font-bold uppercase tracking-tight">Institución Educativa Luis Carlos Galán</h2>
            <div class="flex items-center gap-4">
                <div class="text-right">
                    <p id="userNameDisplay" class="font-bold text-gray-800 leading-none"></p>
                    <span id="userRoleDisplay" class="text-xs text-blue-600 font-bold uppercase"></span>
                </div>
                <div class="w-10 h-10 bg-blue-900 rounded-full flex items-center justify-center text-white font-bold" id="userInitial"></div>
            </div>
        </header>

        <section class="p-8 overflow-y-auto">
            <div class="bg-blue-50 border-l-4 border-blue-800 p-6 rounded-lg mb-8">
                <h1 class="text-2xl font-bold text-blue-900 italic">¡Bienvenido al sistema de gestión académica!</h1>
                <p class="text-gray-600">Aquí podrás consultar tus calificaciones, inasistencias y circulares informativas.</p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6" id="dashboardContent">
                </div>
        </section>
    </main>

    <script>
        // SEGURIDAD: SI NO HAY SESION, REGRESAR AL LOGIN
        const user = JSON.parse(sessionStorage.getItem('activeUser'));
        if(!user) { window.location.href = 'index.html'; }

        // Mostrar datos en el Header
        document.getElementById('userNameDisplay').innerText = user.user;
        document.getElementById('userRoleDisplay').innerText = user.role;
        document.getElementById('userInitial').innerText = user.user[0].toUpperCase();

        function logout() {
            sessionStorage.clear();
            window.location.href = 'index.html';
        }

        // Simular contenido según rol
        const content = document.getElementById('dashboardContent');
        if(user.role === 'Estudiante') {
            content.innerHTML = `
                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                    <i class="fas fa-star text-orange-500 text-3xl mb-4"></i>
                    <h3 class="font-bold">Promedio 1° Periodo</h3>
                    <p class="text-4xl font-black text-blue-900">4.8</p>
                </div>
            `;
        } else if(user.role === 'Docente') {
            content.innerHTML = `
                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                    <i class="fas fa-users text-green-500 text-3xl mb-4"></i>
                    <h3 class="font-bold">Grupos Asignados</h3>
                    <p class="text-4xl font-black text-blue-900">8</p>
                </div>
            `;
        }
    </script>
</body>
</html>
